# Local dev: Postgres + MinIO (S3-compatible) + API + web, all hot-reloading.
# `docker compose up` from the api/ directory. See docs/DEPLOY.md.
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: annealmusic
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ':9001'
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - miniodata:/data

  createbuckets:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until /usr/bin/mc alias set local http://minio:9000 minioadmin minioadmin; do sleep 1; done;
      /usr/bin/mc mb -p local/annealmusic;
      /usr/bin/mc anonymous set download local/annealmusic;
      exit 0;
      "

  api:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ENV: dev
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/annealmusic
      STORAGE_BACKEND: s3
      S3_ENDPOINT: http://minio:9000
      S3_REGION: us-east-1
      S3_BUCKET: annealmusic
      S3_ACCESS_KEY_ID: minioadmin
      S3_SECRET_ACCESS_KEY: minioadmin
      TRANSCODE_ENABLED: 'true'
      CORS_ORIGINS: '["http://localhost:5173"]'
    command: >
      /bin/sh -c "alembic upgrade head &&
      uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    volumes:
      - ./app:/app/app
      - ./alembic:/app/alembic
    ports:
      - '8000:8000'

  web:
    image: node:22-alpine
    working_dir: /web
    command: /bin/sh -c "npm ci && npm run dev -- --host"
    environment:
      VITE_API_BASE: http://localhost:8000
    volumes:
      - ../:/web
    ports:
      - '5173:5173'

volumes:
  pgdata:
  miniodata:
