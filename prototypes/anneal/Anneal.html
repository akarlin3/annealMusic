<script type="text/babel">
// engine.jsx — generative audio engine: coupled oscillators (Kuramoto) +
// Ornstein–Uhlenbeck drift over a harmonic lattice. (docs/prototype.jsx)
const { useRef: useERef, useCallback: useECb, useState: useEState, useEffect: useEEffect } = React;

function makeIR(ctx, duration, decay) {
  const sr = ctx.sampleRate;
  const len = Math.floor(sr * duration);
  const buf = ctx.createBuffer(2, len, sr);
  for (let ch = 0; ch < 2; ch++) {
    const d = buf.getChannelData(ch);
    for (let i = 0; i < len; i++) d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / len, decay);
  }
  return buf;
}

function useAnnealEngine(params) {
  const [isPlaying, setIsPlaying] = useEState(false);
  const [starting, setStarting] = useEState(false);
  const audioRef = useERef({ ctx: null, nodes: null, partials: [] });
  const driftRef = useERef(null);
  const paramsRef = useERef(params);
  useEEffect(() => { paramsRef.current = params; }, [params]);

  const initAudio = useECb(() => {
    const Ctx = window.AudioContext || window.webkitAudioContext;
    const ctx = new Ctx();
    if (ctx.state === 'suspended') ctx.resume();
    const p = paramsRef.current;
    const master = ctx.createGain(); master.gain.value = 0;
    const filter = ctx.createBiquadFilter();
    filter.type = 'lowpass';
    filter.frequency.value = 200 * Math.pow(30, p.brightness); filter.Q.value = 0.6;
    const analyser = ctx.createAnalyser();
    analyser.fftSize = 1024; analyser.smoothingTimeConstant = 0.85;
    const convolver = ctx.createConvolver(); convolver.buffer = makeIR(ctx, 4.0, 2.4);
    const wetGain = ctx.createGain(); wetGain.gain.value = p.space;
    const dryGain = ctx.createGain(); dryGain.gain.value = 1 - p.space * 0.4;
    const masterVol = ctx.createGain(); masterVol.gain.value = p.volume;

    const partials = HARMONICS.slice(0, p.density).map((ratio, i) => {
      const osc = ctx.createOscillator(); osc.type = 'sine';
      osc.frequency.value = p.rootFreq * Math.pow(ratio, p.spread);
      const g = ctx.createGain(); g.gain.value = 0;
      const baseline = ctx.createConstantSource(); baseline.offset.value = 0.32 / (i + 1); baseline.connect(g.gain);
      const lfo = ctx.createOscillator(); lfo.type = 'sine'; lfo.frequency.value = 0.025 + Math.random() * 0.12;
      const lfoGain = ctx.createGain(); lfoGain.gain.value = 0.14 / (i + 1); lfo.connect(lfoGain).connect(g.gain);
      osc.connect(g).connect(filter);
      osc.start(); lfo.start(); baseline.start();
      return { osc, g, lfo, baseline, ratio, detune: 0 };
    });

    filter.connect(dryGain).connect(master);
    filter.connect(convolver).connect(wetGain).connect(master);
    master.connect(masterVol).connect(analyser); analyser.connect(ctx.destination);

    const fade = 3.0 * (paramsRef.current.motionMult || 1);
    master.gain.setValueAtTime(0, ctx.currentTime);
    master.gain.linearRampToValueAtTime(1.0, ctx.currentTime + fade);
    audioRef.current = { ctx, nodes: { master, masterVol, filter, analyser, convolver, wetGain, dryGain }, partials };
  }, []);

  const startDrift = useECb(() => {
    const dt = 0.05;
    driftRef.current = setInterval(() => {
      const a = audioRef.current; const p = paramsRef.current;
      if (!a.ctx || !a.partials.length) return;
      const parts = a.partials;
      const mean = parts.reduce((s, x) => s + x.detune, 0) / parts.length;
      const theta = 0.25, sigma = p.drift * 18, K = p.coupling * 0.9;
      for (const part of parts) {
        const ou = -theta * part.detune * dt;
        const couple = K * (mean - part.detune) * dt;
        const noise = sigma * (Math.random() - 0.5) * Math.sqrt(dt);
        part.detune += ou + couple + noise;
        if (part.detune > 60) part.detune = 60;
        if (part.detune < -60) part.detune = -60;
        try { part.osc.detune.setTargetAtTime(part.detune, a.ctx.currentTime, 0.12); } catch (e) {}
      }
    }, 50);
  }, []);

  const stopDrift = useECb(() => { if (driftRef.current) clearInterval(driftRef.current); driftRef.current = null; }, []);

  useEEffect(() => {
    const a = audioRef.current;
    if (!a.ctx || !a.nodes) return;
    const tt = a.ctx.currentTime;
    a.nodes.filter.frequency.setTargetAtTime(200 * Math.pow(30, params.brightness), tt, 0.25);
    a.nodes.wetGain.gain.setTargetAtTime(params.space, tt, 0.3);
    a.nodes.dryGain.gain.setTargetAtTime(1 - params.space * 0.4, tt, 0.3);
    a.nodes.masterVol.gain.setTargetAtTime(params.volume, tt, 0.2);
    a.partials.forEach((part) => part.osc.frequency.setTargetAtTime(params.rootFreq * Math.pow(part.ratio, params.spread), tt, 0.3));
  }, [params.brightness, params.space, params.rootFreq, params.spread, params.volume]);

  const stop = useECb(() => {
    const a = audioRef.current;
    if (!a.ctx) return;
    try {
      a.nodes.master.gain.cancelScheduledValues(a.ctx.currentTime);
      a.nodes.master.gain.setTargetAtTime(0, a.ctx.currentTime, 0.6);
    } catch (e) {}
    const ctx = a.ctx, parts = a.partials;
    setTimeout(() => {
      parts.forEach(p => { try { p.osc.stop(); p.lfo.stop(); p.baseline.stop(); } catch (e) {} });
      try { ctx.close(); } catch (e) {}
    }, 2200);
    audioRef.current = { ctx: null, nodes: null, partials: [] };
    stopDrift(); setIsPlaying(false);
  }, [stopDrift]);

  const start = useECb(() => {
    if (audioRef.current.ctx) return;
    setStarting(true); initAudio(); startDrift(); setIsPlaying(true);
    setTimeout(() => setStarting(false), 1400);
  }, [initAudio, startDrift]);

  const toggle = useECb(() => { if (audioRef.current.ctx) stop(); else start(); }, [stop, start]);

  useEEffect(() => () => { stopDrift(); const a = audioRef.current; if (a.ctx) { try { a.ctx.close(); } catch (e) {} } }, [stopDrift]);

  return { isPlaying, starting, toggle, start, stop, audioRef, paramsRef };
}

Object.assign(window, { useAnnealEngine });
</script>

// visualizer.jsx — generative field renderer (docs/design/VISUALIZERS.md)
const { useRef: useVRef, useEffect: useVEffect } = React;

function hexToRgb(hex) {
  const m = hex.replace('#', '');
  return [parseInt(m.slice(0, 2), 16), parseInt(m.slice(2, 4), 16), parseInt(m.slice(4, 6), 16)];
}

function Visualizer({ audioRef, paramsRef, mode, isPlaying, intensity, reduceMotion }) {
  const canvasRef = useVRef(null);
  const animRef = useVRef(null);
  const phasesRef = useVRef(HARMONICS.map(() => Math.random() * Math.PI * 2));
  const sizeRef = useVRef({ w: 0, h: 0 });
  const cfgRef = useVRef({ mode, isPlaying, intensity, reduceMotion });
  useVEffect(() => { cfgRef.current = { mode, isPlaying, intensity, reduceMotion }; });

  useVEffect(() => {
    const canvas = canvasRef.current;
    if (!canvas) return;
    const c2d = canvas.getContext('2d');
    const resize = () => {
      const rect = canvas.getBoundingClientRect();
      const dpr = window.devicePixelRatio || 1;
      canvas.width = Math.max(1, Math.floor(rect.width * dpr));
      canvas.height = Math.max(1, Math.floor(rect.height * dpr));
      c2d.setTransform(dpr, 0, 0, dpr, 0, 0);
      sizeRef.current = { w: rect.width, h: rect.height };
    };
    resize();
    window.addEventListener('resize', resize);
    let lastT = performance.now();

    const draw = (now) => {
      animRef.current = requestAnimationFrame(draw);
      const dt = Math.min(0.05, (now - lastT) / 1000); lastT = now;
      const { w, h } = sizeRef.current;
      if (!w || !h) return;
      const cfg = cfgRef.current;
      const t = MODE_TOKENS[cfg.mode];
      const bright = t.visBright * cfg.intensity;
      const speed = cfg.reduceMotion ? 0 : t.visSpeed;
      const [br, bg, bb] = hexToRgb(t.base);
      const [ar, ag, ab] = t.accentRgb.split(',').map(s => parseInt(s));

      c2d.fillStyle = `rgba(${br}, ${bg}, ${bb}, ${0.10 + (1 - cfg.intensity) * 0.05})`;
      c2d.fillRect(0, 0, w, h);

      const a = audioRef.current;
      let spectrum = null;
      if (a.ctx && a.nodes && a.nodes.analyser) {
        spectrum = new Uint8Array(a.nodes.analyser.frequencyBinCount);
        a.nodes.analyser.getByteFrequencyData(spectrum);
      }
      const cx = w / 2, cy = h / 2;
      const baseR = Math.min(w, h) * 0.30;
      const count = a.partials.length || paramsRef.current.density;

      const halo = c2d.createRadialGradient(cx, cy, 0, cx, cy, baseR * 1.7);
      halo.addColorStop(0, `rgba(${ar}, ${ag}, ${ab}, ${0.05 * bright})`);
      halo.addColorStop(1, `rgba(${ar}, ${ag}, ${ab}, 0)`);
      c2d.fillStyle = halo; c2d.fillRect(0, 0, w, h);

      if (t.ornament > 0.2) {
        c2d.strokeStyle = `rgba(${ar}, ${ag}, ${ab}, ${0.04 * t.ornament})`;
        c2d.lineWidth = 1;
        for (let k = 1; k <= 3; k++) {
          const rr = baseR * (0.45 + 0.55 * (k / 3));
          c2d.beginPath(); c2d.ellipse(cx, cy, rr, rr * 0.78, 0, 0, Math.PI * 2); c2d.stroke();
        }
      }

      for (let i = 0; i < count; i++) {
        const partial = a.partials[i];
        const ratio = HARMONICS[i] || 1;
        const freqHz = partial ? partial.osc.frequency.value : paramsRef.current.rootFreq * ratio;
        phasesRef.current[i] = (phasesRef.current[i] + (freqHz / 220) * speed * dt) % (Math.PI * 2);
        const orbit = baseR * (0.45 + 0.55 * (i / Math.max(1, count - 1)));
        const x = cx + Math.cos(phasesRef.current[i]) * orbit;
        const y = cy + Math.sin(phasesRef.current[i]) * orbit * 0.78;
        let amp = 0.4;
        if (spectrum && a.ctx) {
          const binHz = a.ctx.sampleRate / a.nodes.analyser.fftSize;
          const bin = Math.min(spectrum.length - 1, Math.max(2, Math.round(freqHz / binHz)));
          let s = 0; for (let k = bin - 1; k <= bin + 1; k++) s += spectrum[Math.max(0, Math.min(spectrum.length - 1, k))];
          amp = (s / 3) / 255;
        }
        const r = (5 + amp * 22) * (0.7 + cfg.intensity * 0.5);
        const grad = c2d.createRadialGradient(x, y, 0, x, y, r);
        grad.addColorStop(0, `rgba(254, 215, 170, ${Math.min(0.95, (0.55 + amp * 0.35) * bright)})`);
        grad.addColorStop(0.4, `rgba(${ar}, ${ag}, ${ab}, ${(0.30 + amp * 0.25) * bright})`);
        grad.addColorStop(1, `rgba(${ar}, ${ag}, ${ab}, 0)`);
        c2d.fillStyle = grad;
        c2d.beginPath(); c2d.arc(x, y, r, 0, Math.PI * 2); c2d.fill();
        if (t.telemetry && cfg.isPlaying) {
          const [tr, tg, tb] = hexToRgb(t.text);
          c2d.fillStyle = `rgba(${tr}, ${tg}, ${tb}, 0.5)`;
          c2d.font = '10px "Geist Mono", monospace';
          c2d.fillText(`${freqHz.toFixed(1)} Hz (f${i + 1})`, x + r + 6, y + 3);
        }
      }

      if (spectrum && t.spectrum) {
        c2d.strokeStyle = 'rgba(245, 245, 244, 0.35)'; c2d.lineWidth = 1; c2d.beginPath();
        const bottom = h - 14, usable = Math.floor(spectrum.length * 0.45);
        for (let i = 0; i < usable; i++) {
          const px = (i / usable) * w, py = bottom - (spectrum[i] / 255) * 44;
          if (i === 0) c2d.moveTo(px, py); else c2d.lineTo(px, py);
        }
        c2d.stroke();
      } else if (spectrum && t.ornament > 0.2) {
        c2d.strokeStyle = `rgba(245, 245, 244, ${0.16 * t.ornament})`; c2d.lineWidth = 1; c2d.beginPath();
        const bottom = h - 12, usable = Math.floor(spectrum.length * 0.45);
        for (let i = 0; i < usable; i++) {
          const px = (i / usable) * w, py = bottom - (spectrum[i] / 255) * 30;
          if (i === 0) c2d.moveTo(px, py); else c2d.lineTo(px, py);
        }
        c2d.stroke();
      }
    };
    animRef.current = requestAnimationFrame(draw);
    return () => { window.removeEventListener('resize', resize); if (animRef.current) cancelAnimationFrame(animRef.current); };
  }, []);

  return <canvas ref={canvasRef} className="vis-canvas" />;
}

Object.assign(window, { Visualizer });
</script>

  const [phase, setPhase] = useUState({ name: 'Inhale', scale: 0.42 });
  const rafRef = useURef(null), startRef = useURef(0);
  useUEffect(() => {
    if (!active) return;
    const [inhale, holdF, exhale, holdE] = tuple;
    const cycle = inhale + holdF + exhale + holdE;
    startRef.current = performance.now();
    if (reduceMotion) { setPhase({ name: 'Breathe gently', scale: 0.62 }); return; }
    const ease = (x) => 0.5 - 0.5 * Math.cos(Math.PI * x);
    const loop = (now) => {
      const tt = ((now - startRef.current) / 1000) % cycle;
      let name, scale;
      if (tt < inhale) { name = 'Inhale'; scale = 0.42 + 0.46 * ease(tt / inhale); }
      else if (tt < inhale + holdF) { name = 'Hold'; scale = 0.88; }
      else if (tt < inhale + holdF + exhale) { name = 'Exhale'; scale = 0.88 - 0.46 * ease((tt - inhale - holdF) / exhale); }
      else { name = holdE > 0.05 ? 'Hold' : 'Rest'; scale = 0.42; }
      setPhase({ name, scale });
      rafRef.current = requestAnimationFrame(loop);
    };
    rafRef.current = requestAnimationFrame(loop);
    return () => { if (rafRef.current) cancelAnimationFrame(rafRef.current); };
  }, [active, tuple, reduceMotion]);

  if (!active) return null;
  const dim = Math.min(window.innerWidth, window.innerHeight);
  const size = dim * (big ? 0.52 : 0.44);
  return (
    <div className="breath-layer" aria-hidden="true">

      <div className="breath-label font-mono">{phase.name}</div>
    </div>
  );
}

<script type="text/babel">
// screen-breathe.jsx — dedicated breathing / meditation session view
const { useState: useBrState, useEffect: useBrEffect, useRef: useBrRef } = React;

const SESSION_LENGTHS = [5, 10, 15, 20];

function fmtClock(s) {
  const m = Math.floor(s / 60), sec = Math.floor(s % 60);
  return `${m}:${sec.toString().padStart(2, '0')}`;
}

function BreatheScreen() {
  const app = useApp();
  const { mode, engine, tweaks, reduceMotion } = app;
  const [pattern, setPattern] = useBrState('box');
  const [lengthMin, setLengthMin] = useBrState(10);
  const [running, setRunning] = useBrState(false);
  const [elapsed, setElapsed] = useBrState(0);
  const timerRef = useBrRef(null);

  useBrEffect(() => {
    if (!running) return;
    timerRef.current = setInterval(() => {
      setElapsed((e) => {
        const next = e + 1;
        if (next >= lengthMin * 60) { end(); return lengthMin * 60; }
        return next;
      });
    }, 1000);
    return () => clearInterval(timerRef.current);
    // eslint-disable-next-line
  }, [running, lengthMin]);

  const begin = () => { setElapsed(0); setRunning(true); engine.start(); };
  const end = () => { setRunning(false); engine.stop(); if (timerRef.current) clearInterval(timerRef.current); };

  const remaining = Math.max(0, lengthMin * 60 - elapsed);
  const pat = BREATH_PATTERNS[pattern];

  return (
    <div className="breathe">
      <Visualizer audioRef={engine.audioRef} paramsRef={engine.paramsRef} mode={mode}
        isPlaying={engine.isPlaying} intensity={tweaks.intensity * 0.7} reduceMotion={reduceMotion} />
      <BreathOverlay tuple={pat.tuple} active={running} reduceMotion={reduceMotion} big />

      {!running ? (
        <div className="breathe-setup">
          <div className="breathe-eyebrow font-mono">Breathing session</div>

                <Chip key={id} active={id === pattern} onClick={() => setPattern(id)}>{p.label}</Chip>
              ))}
            </div>
          </div>

<script type="text/babel">
// screen-attune.jsx — Biofeedback: connect a sensor, calibrate a baseline, couple it to the field.
// (docs/BIOFEEDBACK.md). No hardware here — uses the built-in mock simulator stream.
const { useState: useAtState, useEffect: useAtEffect, useRef: useAtRef } = React;

const DEVICES = [
  { id: 'sim', name: 'Built-in simulator', metric: 'Simulated HR & HRV', transport: 'mock', cap: 'hrv', recommended: true },
  { id: 'polar-h10', name: 'Polar H10', metric: 'Heart rate & R-R (HRV)', transport: 'Bluetooth', cap: 'hrv' },
  { id: 'verity', name: 'Polar Verity Sense', metric: 'Optical PPG / heart rate', transport: 'Bluetooth', cap: 'hrv' },
  { id: 'muse', name: 'Muse 2', metric: 'EEG delta band power', transport: 'Bluetooth', cap: 'eeg' },
  { id: 'openbci', name: 'OpenBCI Cyton', metric: '8-channel raw EEG', transport: 'WebSerial', cap: 'eeg' },
  { id: 'e4', name: 'Empatica E4', metric: 'GSR / skin conductance', transport: 'WebHID', cap: 'gsr' },
];

const MAPPINGS = [
  { id: 'hrv-coupling', label: 'HRV → Coupling', target: 'coupling', desc: 'A calmer, more coherent heart pulls the partials into unison.' },
  { id: 'hr-brightness', label: 'Heart rate → Brightness', target: 'brightness', desc: 'A quicker pulse opens the filter; rest darkens it.' },
  { id: 'hr-drift', label: 'Heart rate → Drift', target: 'drift', desc: 'Faster beats let the pitches wander; rest stills them.' },
];

const clamp01 = (x) => Math.max(0, Math.min(1, x));

function AttuneScreen() {
  const app = useApp();
  const { engine } = app;
  const [phase, setPhase] = useAtState('idle'); // idle | connecting | connected | calibrating | live
  const [device, setDevice] = useAtState(null);
  const [consent, setConsent] = useAtState(true);
  const [calProgress, setCalProgress] = useAtState(0);
  const [mapping, setMapping] = useAtState('hrv-coupling');
  const [coupled, setCoupled] = useAtState(true);
  const [tele, setTele] = useAtState({ bpm: 62, rr: 968, sdnn: 0, coherence: 0.5, target: 0.4 });
  const [baseline, setBaseline] = useAtState(null);

  const tickRef = useAtRef(null);
  const rrWinRef = useAtRef([]);
  const t0Ref = useAtRef(0);
  const mappingRef = useAtRef(mapping);
  const coupledRef = useAtRef(coupled);
  useAtEffect(() => { mappingRef.current = mapping; }, [mapping]);
  useAtEffect(() => { coupledRef.current = coupled; }, [coupled]);

  const startStream = () => {
    t0Ref.current = performance.now();
    rrWinRef.current = [];
    tickRef.current = setInterval(() => {
      const t = (performance.now() - t0Ref.current) / 1000;
      // simulated heart: slow autonomic wave + respiratory sinus arrhythmia + noise
      const bpm = 61 + 4.2 * Math.sin(t / 7.5) + 1.8 * Math.sin(t / 2.6) + (Math.random() - 0.5) * 1.4;
      const rr = 60000 / bpm;
      const win = rrWinRef.current; win.push(rr); if (win.length > 16) win.shift();
      const mean = win.reduce((a, b) => a + b, 0) / win.length;
      const sdnn = Math.sqrt(win.reduce((a, b) => a + (b - mean) ** 2, 0) / win.length);
      const coherence = clamp01(1 - (bpm - 56) / 16);
      const map = MAPPINGS.find((m) => m.id === mappingRef.current);
      let target;
      if (map.target === 'coupling') target = clamp01(0.2 + coherence * 0.7);
      else target = clamp01((bpm - 52) / 24);
      setTele({ bpm, rr, sdnn, coherence, target });
      if (coupledRef.current) app.setParam(map.target, target);
    }, 180);
  };
  const stopStream = () => { if (tickRef.current) clearInterval(tickRef.current); tickRef.current = null; };

  useAtEffect(() => () => { stopStream(); }, []);

  const connect = (d) => { setDevice(d); setPhase('connecting'); setTimeout(() => { setPhase('connected'); startStream(); }, 1500); };
  const calibrate = () => {
    setPhase('calibrating'); setCalProgress(0);
    const dur = 6000, t0 = performance.now();
    const iv = setInterval(() => {
      const p = Math.min(1, (performance.now() - t0) / dur);
      setCalProgress(p);
      if (p >= 1) { clearInterval(iv); setBaseline({ bpm: tele.bpm, sdnn: Math.max(18, tele.sdnn) }); setPhase('live'); engine.start(); }
    }, 80);
  };
  const disconnect = () => { stopStream(); engine.stop(); setPhase('idle'); setDevice(null); setBaseline(null); };

  const map = MAPPINGS.find((m) => m.id === mapping);

  return (
    <div className="page attune">
      <div className="page-inner narrow">
        <header className="page-head">
          <div className="page-eyebrow font-mono">Attune · biofeedback</div>
          <h1 className="page-title font-display">Let your body shape the field.</h1>
          <p className="page-sub font-body">Pair a heart or breath sensor and the sound responds to your physiology in real time — coupling, brightness and drift follow your nervous system. Opt-in, per channel, and never stored without consent.</p>
        </header>

        {phase === 'idle' && (
          <div className="attune-connect">
            <div className="section-label font-mono">Choose a sensor</div>
            <ul className="device-list">
              {DEVICES.map((d) => (
                <li key={d.id} className="device-row" onClick={() => connect(d)}>
                  <div className="device-meta">
                    <span className={'device-led cap-' + d.cap} />
                    <div>
                      <div className="device-name font-body">{d.name}{d.recommended && <span className="device-rec font-mono">no hardware needed</span>}</div>
                      <div className="device-sub font-mono">{d.metric} · {d.transport}</div>
                    </div>
                  </div>
                  <span className="device-go font-mono">Connect <Icon name="arrowRight" size={12} /></span>
                </li>
              ))}
            </ul>
            <label className="consent">
              <input type="checkbox" checked={consent} onChange={(e) => setConsent(e.target.checked)} />
              <span className="font-body">I consent to processing this physiological channel for live sonification. Nothing is uploaded or stored; the stream stays on this device and stops when I disconnect.</span>
            </label>
          </div>
        )}

        {phase === 'connecting' && (
          <div className="attune-status">
            <div className="connect-spinner" />
            <p className="font-mono attune-status-main">Pairing with {device.name}…</p>
            <p className="font-body attune-status-sub">Establishing the {device.transport === 'mock' ? 'simulated' : device.transport} telemetry stream.</p>
          </div>
        )}

        {phase === 'connected' && (
          <div className="attune-status">
            <div className="connect-ok"><Icon name="check" size={20} /></div>
            <p className="font-mono attune-status-main">{device.name} connected</p>
            <p className="font-body attune-status-sub">Before we couple it to the sound, sit comfortably for a short baseline so your resting rhythm sets the scale.</p>
            <button className="primary attune-cal" onClick={calibrate}><span className="font-mono primary-label">Begin 60-second baseline</span></button>
            <button className="attune-skip font-mono" onClick={() => { setBaseline({ bpm: 62, sdnn: 38 }); setPhase('live'); engine.start(); }}>Skip baseline</button>
          </div>
        )}

        {phase === 'calibrating' && (
          <div className="attune-status">
            <div className="cal-ring" style={{ '--p': calProgress }}>
              <span className="cal-pct font-mono tnum">{Math.round(calProgress * 100)}%</span>
            </div>
            <p className="font-mono attune-status-main">Measuring resting baseline</p>
            <p className="font-body attune-status-sub">Breathe naturally. Computing average R-R interval and SDNN.</p>
            <div className="cal-live font-mono tnum">{Math.round(tele.bpm)} <span className="cal-unit">bpm</span></div>
          </div>
        )}

        {phase === 'live' && (
          <div className="attune-live">
            <div className="live-pulse-wrap">
              <span className="live-pulse" style={{ animationDuration: (tele.rr / 1000).toFixed(2) + 's' }} />
              <span className="live-bpm font-mono tnum">{Math.round(tele.bpm)}</span>
              <span className="live-bpm-unit font-mono">bpm</span>
            </div>

            <div className="tele-grid">
              <div className="tele"><span className="tele-k font-mono">R-R interval</span><span className="tele-v font-mono tnum">{Math.round(tele.rr)} ms</span></div>
              <div className="tele"><span className="tele-k font-mono">SDNN</span><span className="tele-v font-mono tnum">{tele.sdnn.toFixed(1)} ms</span></div>
              <div className="tele"><span className="tele-k font-mono">Coherence</span><span className="tele-v font-mono tnum">{Math.round(tele.coherence * 100)}%</span></div>
              <div className="tele"><span className="tele-k font-mono">Baseline</span><span className="tele-v font-mono tnum">{baseline ? Math.round(baseline.bpm) : '—'} bpm</span></div>
            </div>

            <div className="map-section">
              <div className="section-label font-mono">Mapping</div>
              <div className="chip-row">
                {MAPPINGS.map((m) => <Chip key={m.id} active={m.id === mapping} onClick={() => setMapping(m.id)}>{m.label}</Chip>)}
              </div>
              <p className="map-desc font-body">{map.desc}</p>
              <div className="map-meter">
                <span className="map-meter-label font-mono">{map.target}</span>
                <div className="map-bar"><div className="map-fill" style={{ width: (tele.target * 100) + '%' }} /></div>
                <span className="map-meter-val font-mono tnum">{tele.target.toFixed(2)}</span>
              </div>
            </div>

            <div className="live-controls">
              <button className={'pill font-mono' + (coupled ? ' is-on' : '')} onClick={() => setCoupled((c) => !c)}>{coupled ? 'Coupled to field' : 'Coupling paused'}</button>
              <button className="pill font-mono" onClick={() => app.navigate('listen')}>Open in Listen</button>
              <button className="pill font-mono danger-pill" onClick={disconnect}>Disconnect</button>
            </div>

            <p className="disclaimer-inline font-mono">Live telemetry is processed on-device and discarded on disconnect. Not a medical device.</p>
          </div>
        )}
      </div>
    </div>
  );
}

Object.assign(window, { AttuneScreen });
</script>

<script type="text/babel">
// screen-library.jsx — curated Listening Library (editorial grid, composable filters)
const { useState: useLibState, useMemo: useLibMemo } = React;

function intentionIcon(intention) {
  if (intention === 'Morning') return 'morning';
  if (intention === 'Evening' || intention === 'Sleep') return 'evening';
  if (intention === 'Focus') return 'focus';
  return 'breathe';
}

function LibraryCard({ s, onListen, onPreview, previewing }) {
  return (
    <article className="lib-card">
      <div className="lib-card-top">
        <div className="lib-chips">
          <span className="lib-intent font-mono"><Icon name={intentionIcon(s.intention)} size={12} />{s.intention}</span>
          <span className="lib-len font-mono">{s.lengthMin} min</span>
        </div>
        {s.pick && <span className="lib-pick font-mono">Editor's pick</span>}
      </div>
      <h3 className="lib-title font-display">{s.title}</h3>
      <p className="lib-note font-body">{s.note}</p>
      <div className="lib-character">
        {s.character.map((c) => <span key={c} className="lib-char font-mono">{c}</span>)}
      </div>
      <div className="lib-actions">
        <button className="lib-preview font-mono" onClick={() => onPreview(s)}>
          {previewing ? 'Previewing…' : 'Preview'}
        </button>
        <button className="lib-listen font-mono" onClick={() => onListen(s)}>
          <Icon name="play" size={12} /> Listen
        </button>
      </div>
    </article>
  );
}

function LibraryScreen() {
  const app = useApp();
  const [fIntention, setFIntention] = useLibState(null);
  const [fLength, setFLength] = useLibState(null);
  const [fChar, setFChar] = useLibState(null);
  const [previewId, setPreviewId] = useLibState(null);

  const anyFilter = fIntention || fLength || fChar;

  const filtered = useLibMemo(() => LIBRARY.filter((s) => {
    if (fIntention && s.intention !== fIntention) return false;
    if (fLength) { const L = LENGTHS.find(l => l.id === fLength); if (L && !L.test(s.lengthMin)) return false; }
    if (fChar && !s.character.includes(fChar)) return false;
    return true;
  }), [fIntention, fLength, fChar]);

  const picks = LIBRARY.filter((s) => s.pick);

  const onListen = (s) => { app.loadSession(s); app.navigate('listen'); };
  const onPreview = (s) => {
    app.loadSession(s, true);
    setPreviewId(s.id);
    setTimeout(() => setPreviewId((cur) => cur === s.id ? null : cur), 7000);
  };

  const toggle = (cur, val, set) => set(cur === val ? null : val);

  return (
    <div className="page library">
      <div className="page-inner">
        <header className="page-head">
          <div className="page-eyebrow font-mono">The Listening Library</div>
          <h1 className="page-title font-display">Find something to settle into.</h1>
          <p className="page-sub font-body">A hand-picked catalog of listening sessions — editorial only, no feeds, no trending. Just a calm shelf.</p>
        </header>

        <div className="filters">
          <div className="filter-group">
            <span className="filter-label font-mono">Intention</span>
            <div className="chip-row">{INTENTIONS.map((i) => <Chip key={i} active={fIntention === i} onClick={() => toggle(fIntention, i, setFIntention)}>{i}</Chip>)}</div>
          </div>
          <div className="filter-group">
            <span className="filter-label font-mono">Length</span>
            <div className="chip-row">{LENGTHS.map((l) => <Chip key={l.id} active={fLength === l.id} onClick={() => toggle(fLength, l.id, setFLength)}>{l.label}</Chip>)}</div>
          </div>
          <div className="filter-group">
            <span className="filter-label font-mono">Character</span>
            <div className="chip-row">{CHARACTERS.map((c) => <Chip key={c} active={fChar === c} onClick={() => toggle(fChar, c, setFChar)}>{c}</Chip>)}</div>
          </div>
        </div>

        {!anyFilter && (
          <section className="picks">
            <div className="section-label font-mono">Editor's recent picks</div>
            <div className="lib-grid">
              {picks.map((s) => <LibraryCard key={s.id} s={s} onListen={onListen} onPreview={onPreview} previewing={previewId === s.id} />)}
            </div>
          </section>
        )}

        <section>
          <div className="section-label font-mono">{anyFilter ? `${filtered.length} ${filtered.length === 1 ? 'session' : 'sessions'}` : 'All sessions'}</div>
          {filtered.length === 0 ? (
            <p className="empty font-body">No sessions match those filters. Try widening one.</p>
          ) : (
            <div className="lib-grid">
              {filtered.map((s) => <LibraryCard key={s.id} s={s} onListen={onListen} onPreview={onPreview} previewing={previewId === s.id} />)}
            </div>
          )}
        </section>
      </div>
    </div>
  );
}

Object.assign(window, { LibraryScreen });
</script>

<script type="text/babel">
// screen-history.jsx — private, calm session record (v4.5). No streaks, no goals.
const { useState: useHState } = React;

function fmtDur(min) {
  if (min < 60) return `${Math.round(min)} min`;
  const h = Math.floor(min / 60), m = Math.round(min % 60);
  return m ? `${h} hr ${m} min` : `${h} hr`;
}
function fmtDate(iso) {
  const d = new Date(iso);
  return d.toLocaleDateString(undefined, { weekday: 'short', month: 'short', day: 'numeric' }) +
    ' · ' + d.toLocaleTimeString(undefined, { hour: 'numeric', minute: '2-digit' });
}

function ReflectionEditor({ value, onSave }) {
  const [editing, setEditing] = useHState(false);
  const [text, setText] = useHState(value || '');
  if (!editing && !value) {
    return <button className="refl-add font-mono" onClick={() => setEditing(true)}>+ Add a private reflection</button>;
  }
  if (!editing) {
    return (
      <div className="refl-view">
        <p className="refl-text font-body">{value}</p>
        <button className="refl-edit font-mono" onClick={() => { setText(value); setEditing(true); }}>Edit</button>
      </div>
    );
  }
  return (
    <div className="refl-edit-box">
      <textarea className="refl-area font-body" maxLength={500} value={text} placeholder="Just for you — never shared."
        onChange={(e) => setText(e.target.value)} autoFocus />
      <div className="refl-controls">
        <span className="refl-count font-mono">{text.length}/500</span>
        <button className="refl-cancel font-mono" onClick={() => setEditing(false)}>Cancel</button>
        <button className="refl-save font-mono" onClick={() => { onSave(text.trim()); setEditing(false); }}>Save</button>
      </div>
    </div>
  );
}

function HistoryScreen() {
  const app = useApp();
  const { sessions, stats } = app;

  return (
    <div className="page history">
      <div className="page-inner narrow">
        <header className="page-head">
          <div className="page-eyebrow font-mono">Your sessions</div>
          <h1 className="page-title font-display">A quiet record, only for you.</h1>
          <p className="page-sub font-body">Private by default. No streaks, no goals, no comparisons — just what happened, described plainly.</p>
        </header>

        {stats.total > 0 && (
          <div className="stats-card">
            <p className="stats-main font-body">
              {stats.monthCount} {stats.monthCount === 1 ? 'session' : 'sessions'}, {fmtDur(stats.monthMinutes)} total this month.
            </p>
            <p className="stats-sub font-mono">{stats.total} all-time · average {fmtDur(stats.avgMinutes)}</p>
          </div>
        )}

        {sessions.length === 0 ? (
          <p className="empty font-body">Your sessions will appear here.</p>
        ) : (
          <ul className="sess-list">
            {sessions.map((p) => (
              <li key={p.id} className="sess-item">
                <div className="sess-top">
                  <div>
                    <div className="sess-date font-mono">{fmtDate(p.startedAt)}</div>
                    <h2 className="sess-title font-body">{p.title}</h2>
                    <div className="sess-dur font-mono">Listened {fmtDur(p.minutes)}</div>
                  </div>
                  <div className="sess-actions">
                    <button className="sess-btn" title="Replay this session" onClick={() => app.replaySession(p)}><Icon name="play" size={13} /></button>
                    <button className="sess-btn danger" title="Forget this session" onClick={() => app.forgetSession(p.id)}><Icon name="trash" size={13} /></button>
                  </div>
                </div>
                <ReflectionEditor value={p.reflection} onSave={(text) => app.saveReflection(p.id, text)} />
              </li>
            ))}
          </ul>
        )}
      </div>
    </div>
  );
}

Object.assign(window, { HistoryScreen });
</script>

<script type="text/babel">
// screen-learn.jsx — Education surface: curriculum browser + split lesson player
const { useState: useLnState, useEffect: useLnEffect, useRef: useLnRef } = React;

const LEARN_CONTROLS = [
  { key: 'rootFreq',   label: 'Root',       min: 55,  max: 220, step: 1,    fmt: v => `${v.toFixed(0)} Hz` },
  { key: 'spread',     label: 'Spread',     min: 0.7, max: 1.3, step: 0.01, fmt: v => v.toFixed(2) },
  { key: 'coupling',   label: 'Coupling',   min: 0,   max: 1,   step: 0.01, fmt: v => v.toFixed(2) },
  { key: 'drift',      label: 'Drift',      min: 0,   max: 1,   step: 0.01, fmt: v => v.toFixed(2) },
  { key: 'brightness', label: 'Brightness', min: 0,   max: 1,   step: 0.01, fmt: v => v.toFixed(2) },
  { key: 'space',      label: 'Space',      min: 0,   max: 1,   step: 0.01, fmt: v => v.toFixed(2) },
];

const DIFF_LABEL = { intro: 'Intro', intermediate: 'Intermediate', advanced: 'Advanced' };

// ── Curriculum browser ──
function CurriculumBrowser({ onOpen }) {
  const app = useApp();
  const prog = app.lessonProgress;
  const completedCount = LESSONS.filter((l) => prog[l.id]?.completed).length;
  const tracks = [...new Set(LESSONS.map((l) => l.track))];

  // next-lesson offer: first 1-3 not-completed
  const offers = LESSONS.filter((l) => !prog[l.id]?.completed).slice(0, 3);

  return (
    <div className="page learn-browser">
      <div className="page-inner">
        <header className="page-head">
          <div className="page-eyebrow font-mono">Learn</div>
          <h1 className="page-title font-display">Understand the instrument.</h1>
          <p className="page-sub font-body">Self-paced explorations of the math and sound behind Anneal. Move at your own pace — nothing is gated, nothing is timed.</p>
        </header>

        {offers.length > 0 && (
          <section className="offer">
            <div className="section-label font-mono">{completedCount === 0 ? 'Start here' : 'Where to next'}</div>
            <div className="offer-row">
              {offers.map((l) => (
                <button key={l.id} className="offer-card" onClick={() => onOpen(l.id)}>
                  <span className="offer-track font-mono">{l.track}</span>
                  <span className="offer-title font-display">{l.title}</span>
                  <span className="offer-why font-body">{l.summary}</span>
                  <span className="offer-go font-mono">{prog[l.id]?.step > 0 ? 'Resume →' : 'Begin →'}</span>
                </button>
              ))}
            </div>
          </section>
        )}

        {tracks.map((track) => (
          <section key={track} className="track">
            <div className="section-label font-mono">{track}</div>
            <ul className="lesson-list">
              {LESSONS.filter((l) => l.track === track).map((l) => {
                const p = prog[l.id] || {};
                return (
                  <li key={l.id} className="lesson-row" onClick={() => onOpen(l.id)}>
                    <div className="lesson-meta">
                      <span className={'lesson-state' + (p.completed ? ' done' : '')}>
                        {p.completed ? <Icon name="check" size={12} /> : <Icon name="dot" size={8} />}
                      </span>
                      <div>
                        <h3 className="lesson-title font-body">{l.title}</h3>
                        <p className="lesson-summary font-body">{l.summary}</p>
                      </div>
                    </div>
                    <div className="lesson-right font-mono">
                      <span className="lesson-diff">{DIFF_LABEL[l.difficulty]}</span>
                      <span className="lesson-min">{l.minutes} min</span>
                      {p.step > 0 && !p.completed && <span className="lesson-resume">Resume</span>}
                    </div>
                  </li>
                );
              })}
            </ul>
          </section>
        ))}

        <p className="learn-count font-mono">{completedCount} of {LESSONS.length} lessons explored</p>
      </div>
    </div>
  );
}

// ── Mini instrument panel (embedded in lesson player) ──
function LessonInstrument({ allow, highlight }) {
  const app = useApp();
  const { engine, params, setParam, mode, tweaks, reduceMotion } = app;
  const constrained = allow && allow.length > 0;
  return (
    <div className="instrument">
      <div className="instrument-vis">
        <Visualizer audioRef={engine.audioRef} paramsRef={engine.paramsRef} mode={mode}
          isPlaying={engine.isPlaying} intensity={tweaks.intensity} reduceMotion={reduceMotion} />
        <button className={'inst-play' + (engine.isPlaying ? ' is-playing' : '')} onClick={engine.toggle}>
          {engine.isPlaying
            ? <svg width="12" height="12" viewBox="0 0 16 16"><rect x="4" y="3.2" width="2.6" height="9.6" rx="0.6" fill="currentColor"/><rect x="9.4" y="3.2" width="2.6" height="9.6" rx="0.6" fill="currentColor"/></svg>
            : <Icon name="play" size={12} />}
          <span className="font-mono">{engine.isPlaying ? 'Stop' : 'Hear it'}</span>
        </button>
      </div>
      <div className="inst-controls">
        {LEARN_CONTROLS.map((c) => {
          const locked = constrained && !allow.includes(c.key);
          const hot = highlight === c.key;
          return (
            <div key={c.key} className={'inst-row' + (locked ? ' locked' : '') + (hot ? ' hot' : '')}>
              <div className="inst-row-top">
                <label className="inst-label">{c.label}{locked && <span className="font-mono inst-lock">lesson</span>}</label>
                <span className="inst-val font-mono tnum">{c.fmt(params[c.key])}</span>
              </div>
              <Range value={params[c.key]} min={c.min} max={c.max} step={c.step} disabled={locked} onChange={(v) => setParam(c.key, v)} />
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ── Step body renderers ──
function StepBody({ step, reflection, onReflect }) {
  if (step.type === 'text') {
    return (
      <div className="step-body">
        <span className="step-kind font-mono">Concept</span>
        <h2 className="step-title font-display">{step.title}</h2>
        <p className="step-text font-body">{step.body}</p>
        {step.takeaways && (
          <ul className="takeaways">
            {step.takeaways.map((t, i) => <li key={i} className="font-body"><span className="tk-dot" />{t}</li>)}
          </ul>
        )}
      </div>
    );
  }
  if (step.type === 'demo') {
    return (
      <div className="step-body">
        <span className="step-kind font-mono">Demonstration</span>
        <h2 className="step-title font-display">{step.title}</h2>
        <p className="step-text font-body">{step.body}</p>
        <p className="step-hint font-mono">The instrument has been set to a starting pose →</p>
      </div>
    );
  }
  if (step.type === 'prompt') {
    return (
      <div className="step-body">
        <span className="step-kind font-mono">Try it</span>
        <h2 className="step-title font-display">{step.title}</h2>
        <p className="step-text font-body">{step.body}</p>
        {step.hint && <p className="step-hint font-mono">{step.hint}</p>}
      </div>
    );
  }
  // reflection
  return (
    <div className="step-body">
      <span className="step-kind font-mono">Reflection</span>
      <h2 className="step-title font-display">{step.title}</h2>
      <p className="step-text font-body">{step.question}</p>
      <textarea className="refl-area learn-refl font-body" placeholder="Optional, private, and saved only on this device."
        value={reflection} onChange={(e) => onReflect(e.target.value)} maxLength={500} />
      <p className="step-hint font-mono">Reflections are voluntary — you can move on whenever you like.</p>
    </div>
  );
}

// ── Lesson player ──
function LessonPlayer({ lessonId, onExit }) {
  const app = useApp();
  const lesson = LESSONS.find((l) => l.id === lessonId);
  const saved = app.lessonProgress[lessonId] || {};
  const [stepIdx, setStepIdx] = useLnState(saved.step || 0);
  const [reflections, setReflections] = useLnState(saved.reflections || {});
  const [highlight, setHighlight] = useLnState(null);
  const step = lesson.steps[stepIdx];

  // apply demo patch + highlight when entering a demo/prompt step
  useLnEffect(() => {
    if (step.type === 'demo' && step.patch) {
      app.loadParams(step.patch);
      if (step.highlight) { setHighlight(step.highlight); const t = setTimeout(() => setHighlight(null), 3000); return () => clearTimeout(t); }
    } else if (step.type === 'prompt' && step.hint) {
      if (step.allow && step.allow[0]) { setHighlight(step.allow[0]); const t = setTimeout(() => setHighlight(null), 3000); return () => clearTimeout(t); }
    }
    // eslint-disable-next-line
  }, [stepIdx, lessonId]);

  useLnEffect(() => { app.setLessonStep(lessonId, stepIdx); /* eslint-disable-next-line */ }, [stepIdx]);

  const isLast = stepIdx === lesson.steps.length - 1;
  const allow = step.type === 'prompt' ? step.allow : null;

  const next = () => {
    if (isLast) { app.completeLesson(lessonId, reflections); onExit(); }
    else setStepIdx((i) => i + 1);
  };
  const onReflect = (text) => setReflections((r) => ({ ...r, [stepIdx]: text }));

  return (
    <div className="page lesson-player">
      <div className="player-bar">
        <button className="player-back font-mono" onClick={onExit}><Icon name="arrowLeft" size={13} /> All lessons</button>
        <span className="player-lesson font-mono">{lesson.title}</span>
        <ProgressDots total={lesson.steps.length} current={stepIdx} />
      </div>
      <div className="player-split">
        <div className="player-left">
          <StepBody step={step} reflection={reflections[stepIdx] || ''} onReflect={onReflect} />
          <div className="player-nav">
            <button className="pnav-prev font-mono" disabled={stepIdx === 0} onClick={() => setStepIdx((i) => Math.max(0, i - 1))}>
              <Icon name="arrowLeft" size={13} /> Back
            </button>
            <button className="pnav-next font-mono" onClick={next}>
              {isLast ? 'Complete' : 'Next'} <Icon name={isLast ? 'check' : 'arrowRight'} size={13} />
            </button>
          </div>
        </div>
        <div className="player-right">
          <LessonInstrument allow={allow} highlight={highlight} />
        </div>
      </div>
    </div>
  );
}

function LearnScreen() {
  const [openId, setOpenId] = useLnState(null);
  if (openId) return <LessonPlayer lessonId={openId} onExit={() => setOpenId(null)} />;
  return <CurriculumBrowser onOpen={setOpenId} />;
}

Object.assign(window, { LearnScreen });
</script>

<script type="text/babel">
// screen-gallery.jsx — creator-side discovery of published patches (docs/API.md, gallery/types.ts)
const { useState: useGState, useMemo: useGMemo } = React;

const SORTS = [
  { id: 'newest', label: 'Newest' },
  { id: 'oldest', label: 'Oldest' },
  { id: 'most_loaded', label: 'Most loaded' },
  { id: 'most_liked', label: 'Most liked' },
];

// Generative field thumbnail derived from a patch's params (static, no rAF).
function CardVisual({ params, mode }) {
  const t = MODE_TOKENS[mode] || MODE_TOKENS.musician;
  const n = params.density;
  const dots = Array.from({ length: n }).map((_, i) => {
    const ang = (i / n) * Math.PI * 2 + params.drift * 3;
    const orbit = 18 + 26 * (i / Math.max(1, n - 1));
    const x = 50 + Math.cos(ang) * orbit;
    const y = 50 + Math.sin(ang) * orbit * 0.8;
    const r = 3 + params.brightness * 6;
    return { x, y, r, key: i };
  });
  return (
    <div className="gcard-vis" data-mode={mode} style={{ background: t.base }}>
      <div className="gcard-halo" style={{ opacity: 0.3 + params.space * 0.5 }} />
      {dots.map((d) => (
        <span key={d.key} className="gcard-dot" style={{ left: d.x + '%', top: d.y + '%', width: d.r * 2, height: d.r * 2, opacity: 0.4 + params.brightness * 0.5 }} />
      ))}
      <span className="gcard-eng font-mono">{ENGINES[params._engine] ? '' : ''}</span>
    </div>
  );
}

function ReportModal({ open, item, onClose, onSubmit }) {
  const [reason, setReason] = useGState('inappropriate');
  const [detail, setDetail] = useGState('');
  if (!open) return null;
  const REASONS = [{ id: 'spam', label: 'Spam' }, { id: 'inappropriate', label: 'Inappropriate' }, { id: 'other', label: 'Other' }];
  return (
    <div className="modal-scrim" onClick={(e) => { if (e.target === e.currentTarget) onClose(); }}>
      <div className="modal report-modal">
        <div className="modal-head">
          <span className="modal-title font-mono">Report “{item?.title}”</span>
          <button className="modal-x" onClick={onClose}><Icon name="x" size={14} /></button>
        </div>
        <div className="ai-body">
          <label className="ai-label font-mono">Reason</label>
          <div className="chip-row" style={{ marginBottom: 16 }}>
            {REASONS.map((r) => <Chip key={r.id} active={reason === r.id} onClick={() => setReason(r.id)}>{r.label}</Chip>)}
          </div>
          <label className="ai-label font-mono">Anything else? (optional)</label>
          <textarea className="refl-area font-body" rows={3} value={detail} maxLength={400}
            placeholder="Context helps our editors review fairly." onChange={(e) => setDetail(e.target.value)} />
          <p className="save-note font-body">Reports are private and reviewed by the AnnealMusic editors. Thank you for keeping the gallery calm.</p>
          <div className="modal-actions">
            <button className="modal-cancel font-mono" onClick={onClose}>Cancel</button>
            <button className="modal-go font-mono" onClick={() => onSubmit(reason)}>Submit report</button>
          </div>
        </div>
      </div>
    </div>
  );
}

function GalleryCard({ item, onRemix, onPreview, previewing, onMenu, menuOpen, onEmbed, onReport }) {
  const showPreview = item.preview === 'ready';
  return (
    <article className="gcard">
      <CardVisual params={{ ...item.params, _engine: item.engine }} mode={item.mode} />
      <div className="gcard-body">
        <div className="gcard-badges">
          <span className="eng-badge font-mono">{ENGINES[item.engine].label}</span>
          <span className="gcard-mode font-mono">{MODE_META[item.mode].label}</span>
          {item.captures && <span className="gcard-cap font-mono" title="Includes captured loops">loops</span>}
        </div>
        <h3 className="gcard-title font-display">{item.title}</h3>
        <p className="gcard-desc font-body">{item.description}</p>
        <div className="gcard-foot">
          <span className="gcard-loads font-mono">{item.loads.toLocaleString()} loads · {item.creator}</span>
          <div className="gcard-actions">
            {showPreview
              ? <button className="gcard-prev font-mono" onClick={() => onPreview(item)}>{previewing ? '▮▮' : '▶'}</button>
              : <span className="gcard-prev-na font-mono" title={item.preview === 'rendering' ? 'Preview rendering' : 'No preview'}>{item.preview === 'rendering' ? '···' : '—'}</span>}
            <button className="gcard-remix font-mono" onClick={() => onRemix(item)}>Remix</button>
            <div className="gcard-menu-wrap">
              <button className="gcard-more" onClick={() => onMenu(item.id)} aria-label="More">···</button>
              {menuOpen && (
                <div className="gcard-menu font-mono">
                  <button onClick={() => onEmbed(item)}>Get embed code</button>
                  <button className="gcard-menu-report" onClick={() => onReport(item)}>Report</button>
                </div>
              )}
            </div>
          </div>
        </div>
      </div>
    </article>
  );
}

function GalleryScreen() {
  const app = useApp();
  const [q, setQ] = useGState('');
  const [sort, setSort] = useGState('newest');
  const [engine, setEngine] = useGState(null);
  const [fmode, setFmode] = useGState(null);
  const [capturesOnly, setCapturesOnly] = useGState(false);
  const [previewId, setPreviewId] = useGState(null);
  const [menuId, setMenuId] = useGState(null);
  const [reportItem, setReportItem] = useGState(null);

  const items = useGMemo(() => {
    let list = GALLERY_ITEMS.filter((it) => {
      if (engine && it.engine !== engine) return false;
      if (fmode && it.mode !== fmode) return false;
      if (capturesOnly && !it.captures) return false;
      if (q && !(it.title + ' ' + it.description).toLowerCase().includes(q.toLowerCase())) return false;
      return true;
    });
    list = [...list];
    if (sort === 'newest') list.sort((a, b) => b.publishedAt.localeCompare(a.publishedAt));
    else if (sort === 'oldest') list.sort((a, b) => a.publishedAt.localeCompare(b.publishedAt));
    else if (sort === 'most_loaded') list.sort((a, b) => b.loads - a.loads);
    else if (sort === 'most_liked') list.sort((a, b) => b.loads * 0.7 - a.loads * 0.7); // proxy
    return list;
  }, [q, sort, engine, fmode, capturesOnly]);

  const onRemix = (it) => { app.loadSession({ title: it.title, params: it.params }); app.navigate('listen'); };
  const onPreview = (it) => { app.loadSession({ title: it.title, params: it.params }, true); setPreviewId(it.id); setTimeout(() => setPreviewId((c) => c === it.id ? null : c), 7000); };

  return (
    <div className="page gallery" onClick={() => menuId && setMenuId(null)}>
      <div className="page-inner">
        <header className="page-head">
          <div className="page-eyebrow font-mono">Gallery</div>
          <h1 className="page-title font-display">What others have published.</h1>
          <p className="page-sub font-body">The creator-side shelf: patches and pieces shared by the community. Load one as your own starting point, or remix it. Editorial picks live in the Library.</p>
        </header>

        <div className="gallery-controls">
          <div className="search-wrap">
            <Icon name="listen" size={14} />
            <input className="search-input font-body" value={q} placeholder="Search patches…" onChange={(e) => setQ(e.target.value)} />
          </div>
          <div className="chip-row sort-chips">{SORTS.map((s) => <Chip key={s.id} active={sort === s.id} onClick={() => setSort(s.id)}>{s.label}</Chip>)}</div>
        </div>
        <div className="gallery-filters">
          <span className="filter-label font-mono">Engine</span>
          <div className="chip-row">{ENGINE_ORDER.map((id) => <Chip key={id} active={engine === id} onClick={() => setEngine(engine === id ? null : id)}>{ENGINES[id].label}</Chip>)}</div>
          <span className="filter-label font-mono filter-label-2">Voice</span>
          <div className="chip-row">{MODE_ORDER.map((m) => <Chip key={m} active={fmode === m} onClick={() => setFmode(fmode === m ? null : m)}>{MODE_META[m].label}</Chip>)}
            <Chip active={capturesOnly} onClick={() => setCapturesOnly((c) => !c)}>With loops</Chip>
          </div>
        </div>

        <div className="section-label font-mono">{items.length} {items.length === 1 ? 'patch' : 'patches'}</div>
        {items.length === 0 ? <p className="empty font-body">No patches match. Try clearing a filter.</p> : (
          <div className="gallery-grid">
            {items.map((it) => (
              <GalleryCard key={it.id} item={it} onRemix={onRemix} onPreview={onPreview} previewing={previewId === it.id}
                onMenu={(id) => setMenuId((c) => c === id ? null : id)} menuOpen={menuId === it.id}
                onEmbed={(i) => { setMenuId(null); app.openEmbed(i); }} onReport={(i) => { setMenuId(null); setReportItem(i); }} />
            ))}
          </div>
        )}
      </div>
      <ReportModal open={!!reportItem} item={reportItem} onClose={() => setReportItem(null)} onSubmit={() => { setReportItem(null); app.toast('Report submitted — thank you.'); }} />
    </div>
  );
}

Object.assign(window, { GalleryScreen });
</script>

<script type="text/babel">
// screen-research.jsx — Perceptual Experimentation Framework (docs/EXPERIMENTS.md)
// Consent-gated runner, Likert trials, live datalogger telemetry, review-before-export.
const { useState: useReState, useEffect: useReEffect, useRef: useReRef } = React;

const PROTOCOL = {
  title: 'Dyad Consonance Perception Study',
  description: 'A short behavioral study of perceived consonance across tuned intervals. Rate how pleasant or stable each sustained dyad feels.',
  estMin: 4,
};
// Each stimulus tunes the lattice to an interval; spread shifts the partial ratio.
const STIMULI = [
  { id: 'octave',        label: 'Octave (2:1)',          params: { rootFreq: 110, spread: 1.0, density: 2, coupling: 0.6, drift: 0.2, brightness: 0.4, space: 0.5 } },
  { id: 'perfect_fifth', label: 'Perfect fifth (3:2)',   params: { rootFreq: 110, spread: 1.17, density: 2, coupling: 0.6, drift: 0.2, brightness: 0.45, space: 0.5 } },
  { id: 'tritone',       label: 'Tritone (45:32)',       params: { rootFreq: 110, spread: 1.29, density: 2, coupling: 0.4, drift: 0.35, brightness: 0.55, space: 0.5 } },
  { id: 'major_third',   label: 'Major third (5:4)',     params: { rootFreq: 110, spread: 1.1, density: 2, coupling: 0.6, drift: 0.2, brightness: 0.45, space: 0.5 } },
  { id: 'minor_second',  label: 'Minor second (16:15)',  params: { rootFreq: 110, spread: 1.03, density: 2, coupling: 0.3, drift: 0.45, brightness: 0.6, space: 0.5 } },
];
const LIKERT = [1, 2, 3, 4, 5, 6, 7];

function DataLogger({ active, audioRef, coupling }) {
  const [feat, setFeat] = useReState({ rms: 0, centroid: 0, flux: 0, order: 0 });
  const [lines, setLines] = useReState([]);
  const ivRef = useReRef(null);
  const prevRef = useReRef(null);
  const tRef = useReRef(0);
  useReEffect(() => {
    if (!active) return;
    tRef.current = 0;
    ivRef.current = setInterval(() => {
      const a = audioRef.current;
      let rms = 0, centroid = 0, flux = 0;
      if (a.ctx && a.nodes && a.nodes.analyser) {
        const buf = new Uint8Array(a.nodes.analyser.frequencyBinCount);
        a.nodes.analyser.getByteFrequencyData(buf);
        let sum = 0, wsum = 0, e = 0;
        const binHz = a.ctx.sampleRate / a.nodes.analyser.fftSize;
        for (let i = 0; i < buf.length; i++) { const v = buf[i] / 255; sum += v; wsum += v * i * binHz; e += v * v; }
        rms = Math.sqrt(e / buf.length);
        centroid = sum > 0 ? wsum / (sum) : 0;
        if (prevRef.current) { let f = 0; for (let i = 0; i < buf.length; i++) f += Math.abs(buf[i] - prevRef.current[i]); flux = f / buf.length; }
        prevRef.current = buf;
      } else {
        rms = 0.35 + Math.random() * 0.15; centroid = 700 + Math.random() * 300; flux = 8 + Math.random() * 6;
      }
      const order = Math.min(0.99, coupling * 0.9 + 0.08 + (Math.random() - 0.5) * 0.04);
      tRef.current += 0.1;
      const line = { t: tRef.current.toFixed(2), rms: rms.toFixed(3), centroid: centroid.toFixed(1), flux: flux.toFixed(1), order: order.toFixed(3) };
      setFeat({ rms, centroid, flux, order });
      setLines((ls) => [line, ...ls].slice(0, 5));
    }, 100);
    return () => clearInterval(ivRef.current);
  }, [active, coupling]);

  return (
    <div className="datalog">
      <div className="datalog-head font-mono">Datalogger · 30 Hz <span className={'datalog-live' + (active ? ' on' : '')}>{active ? 'logging' : 'idle'}</span></div>
      <div className="datalog-feats">
        {[['rms', feat.rms.toFixed(3)], ['centroid', feat.centroid.toFixed(0) + ' Hz'], ['flux', feat.flux.toFixed(1)], ['order param', feat.order.toFixed(3)]].map(([k, v]) => (
          <div key={k} className="datalog-feat"><span className="dl-k font-mono">{k}</span><span className="dl-v font-mono tnum">{v}</span></div>
        ))}
      </div>
      <div className="datalog-stream font-mono">
        {lines.map((l, i) => <div key={i} className="dl-line" style={{ opacity: 1 - i * 0.18 }}>{`{"t":${l.t},"rms":${l.rms},"centroid":${l.centroid},"flux":${l.flux},"order":${l.order}}`}</div>)}
      </div>
    </div>
  );
}

function ResearchScreen() {
  const app = useApp();
  const { engine } = app;
  const [phase, setPhase] = useReState('intro'); // intro | running | review | done
  const [consent, setConsent] = useReState(false);
  const [trial, setTrial] = useReState(0);
  const [responses, setResponses] = useReState([]);
  const [trialStart, setTrialStart] = useReState(0);

  const stim = STIMULI[trial];

  useReEffect(() => {
    if (phase !== 'running') return;
    app.loadParams(stim.params); engine.start(); setTrialStart(performance.now());
    // eslint-disable-next-line
  }, [phase, trial]);

  const begin = () => { setResponses([]); setTrial(0); setPhase('running'); };
  const respond = (value) => {
    const rt = Math.round(performance.now() - trialStart);
    const rec = { trial_index: trial, stimulus_id: stim.id, response_type: 'LikertResponse', response_value: value, rt_ms: rt };
    const next = [...responses, rec]; setResponses(next);
    if (trial + 1 >= STIMULI.length) { engine.stop(); setPhase('review'); } else setTrial((t) => t + 1);
  };
  const withdraw = () => { engine.stop(); setResponses([]); setTrial(0); setConsent(false); setPhase('intro'); app.toast('Withdrawn — all trial data wiped from memory.'); };

  const downloadZip = () => {
    const csv = ['subject_id,trial_index,stimulus_id,response_type,response_value,rt_ms']
      .concat(responses.map((r) => `sub-prototype,${r.trial_index},${r.stimulus_id},${r.response_type},${r.response_value},${r.rt_ms}`)).join('\n');
    const blob = new Blob([csv], { type: 'text/csv' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a'); a.href = url; a.download = 'responses.csv'; a.click();
    setTimeout(() => URL.revokeObjectURL(url), 1000);
    app.toast('responses.csv downloaded.'); setPhase('done');
  };

  return (
    <div className="page research">
      <div className="page-inner narrow">
        <header className="page-head">
          <div className="page-eyebrow font-mono">Research · perceptual study</div>
          <h1 className="page-title font-display">{PROTOCOL.title}</h1>
          <p className="page-sub font-body">{PROTOCOL.description}</p>
        </header>

        {phase === 'intro' && (
          <div className="re-intro">
            <div className="re-meta font-mono">
              <span>{STIMULI.length} trials</span><span>·</span><span>~{PROTOCOL.estMin} min</span><span>·</span><span>Likert 1–7</span>
            </div>
            <div className="re-consent">
              <div className="re-consent-head font-mono">Informed consent</div>
              <p className="font-body">Participation is voluntary and anonymous. No cookies or identifiers are set. Audio plays in your browser; behavioral responses stay in memory and are never sent anywhere unless you explicitly export them. You may withdraw at any time, which immediately wipes all collected data.</p>
              <label className="consent">
                <input type="checkbox" checked={consent} onChange={(e) => setConsent(e.target.checked)} />
                <span className="font-body">I have read the above and consent to participate.</span>
              </label>
            </div>
            <button className="primary re-begin" disabled={!consent} onClick={begin}><span className="font-mono primary-label">Begin study</span></button>
          </div>
        )}

        {phase === 'running' && (
          <div className="re-run">
            <div className="re-progress">
              <ProgressDots total={STIMULI.length} current={trial} />
              <span className="re-trial-n font-mono">Trial {trial + 1} / {STIMULI.length}</span>
            </div>
            <div className="re-stim">
              <span className="re-stim-eyebrow font-mono">Now sounding</span>
              <h2 className="re-stim-label font-display">{stim.label}</h2>
              <p className="re-stim-q font-body">How consonant — stable and pleasant — does this dyad feel?</p>
            </div>
            <div className="likert">
              <span className="likert-end font-mono">Dissonant</span>
              {LIKERT.map((v) => <button key={v} className="likert-btn font-mono" onClick={() => respond(v)}>{v}</button>)}
              <span className="likert-end font-mono">Consonant</span>
            </div>
            <DataLogger active={true} audioRef={engine.audioRef} coupling={stim.params.coupling} />
            <button className="re-withdraw font-mono" onClick={withdraw}>Withdraw &amp; wipe</button>
          </div>
        )}

        {(phase === 'review' || phase === 'done') && (
          <div className="re-review">
            <div className="re-review-head font-mono">{phase === 'done' ? 'Session complete' : 'Review before export'}</div>
            <p className="font-body re-review-sub">Here is every byte that would be transmitted or saved. Nothing leaves your device until you choose to download.</p>
            <div className="re-files">
              <div className="re-file">
                <span className="re-file-name font-mono">responses.csv</span>
                <pre className="re-file-body font-mono">{['subject_id,trial_index,stimulus_id,response_value,rt_ms'].concat(responses.map((r) => `sub-prototype,${r.trial_index},${r.stimulus_id},${r.response_value},${r.rt_ms}`)).join('\n')}</pre>
              </div>
              <div className="re-file">
                <span className="re-file-name font-mono">manifest.json</span>
                <pre className="re-file-body font-mono">{JSON.stringify({ experiment_title: PROTOCOL.title, subject_id: 'sub-prototype', schema_version: 'v20', anneal_music_version: '9.1.0', trials: responses.length }, null, 2)}</pre>
              </div>
            </div>
            <div className="re-review-actions">
              <button className="re-withdraw font-mono" onClick={withdraw}>Discard all</button>
              {phase === 'review' && <button className="modal-go font-mono" onClick={downloadZip}><Icon name="arrowRight" size={12} /> Download ZIP</button>}
              {phase === 'done' && <button className="modal-go font-mono" onClick={() => { setConsent(false); setPhase('intro'); }}>New session</button>}
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

Object.assign(window, { ResearchScreen });
</script>

<script type="text/babel">
// screen-settings.jsx — Account, Health & Integrations, privacy (opt-in only; docs/HEALTH, CALM_BY_DESIGN)

function Switch({ on, onChange, id }) {

  return (

          <p className="page-sub font-body">Everything here is opt-in. Nothing syncs, notifies, or leaves your device unless you switch it on.</p>

        <section className="set-card">
          <div className="set-card-head font-mono">Account</div>
          <div className="set-account">
            <div className="set-account-text font-body">You're using Anneal anonymously. Sign in to keep your history and lesson progress across devices.</div>
            <button className="set-signin font-mono" onClick={() => app.toast('Sign-in is stubbed in this prototype.')}>Sign in</button>
          </div>
          <p className="set-fine font-body">No account is required to use any core feature.</p>
        </section>

        <section className="set-card">
          <div className="set-card-head font-mono">Health &amp; Integrations <span className="set-prem font-mono">Premium</span></div>

          <SettingRow title="Sync with Google Health Connect" desc="Writes your mindfulness sessions to Android Health Connect." on={googleHealth} onChange={(v) => { setGoogleHealth(v); app.toast(v ? 'Health Connect enabled' : 'Health Connect disabled'); }} />
          <SettingRow title="Include bell-timer sessions" desc="Include silent focus-timer sessions punctuated by chimes in synced records." on={includeTimer} onChange={setIncludeTimer} />
          <p className="set-fine font-body">Health sync is 100% voluntary and easily turned off. It never blocks any synthesis feature.</p>

        <section className="set-card">

        <button className="set-replay font-mono" onClick={() => { try { localStorage.removeItem('am_onboarded'); } catch (e) {} app.navigate('onboarding'); }}>Replay first-run experience</button>

}

Object.assign(window, { SettingsScreen });

<!-- module: input-loop.jsx -->
<script type="text/babel">
// input-loop.jsx — Live input + Loop pedal, shown as the Listen "Perform" drawer.
// (docs/INPUT_GUIDE.md, docs/LOOP_GUIDE.md). Input meter is real when mic is granted.
const { useState: useIlState, useEffect: useIlEffect, useRef: useIlRef } = React;

const MOCK_DEVICES = ['Default — System microphone', 'Scarlett 2i2 USB', 'BlackHole 2ch (loopback)'];
const SLOT_IDS = ['A', 'B', 'C'];

// Real mic level when permission granted; otherwise a believable simulated signal.
function InputMeter({ active }) {
  const [level, setLevel] = useIlState(0);
  const [clip, setClip] = useIlState(false);
  const [src, setSrc] = useIlState('sim');
  const rafRef = useIlRef(null), ctxRef = useIlRef(null), anRef = useIlRef(null), streamRef = useIlRef(null);
  useIlEffect(() => {
    if (!active) { setLevel(0); return; }
    let cancelled = false, buf = null, t = 0, frame = 0;
    (async () => {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: { echoCancellation: false, noiseSuppression: false, autoGainControl: false } });
        if (cancelled) { stream.getTracks().forEach((x) => x.stop()); return; }
        streamRef.current = stream;
        const ctx = new (window.AudioContext || window.webkitAudioContext)(); ctxRef.current = ctx;
        const s = ctx.createMediaStreamSource(stream); const an = ctx.createAnalyser(); an.fftSize = 512; s.connect(an);
        anRef.current = an; buf = new Uint8Array(an.fftSize); setSrc('mic');
      } catch (e) { setSrc('sim'); }
      const loop = () => {
        frame++;
        if (frame % 2 === 0) {
          if (anRef.current && buf) {
            anRef.current.getByteTimeDomainData(buf);
            let sum = 0; for (let i = 0; i < buf.length; i++) { const v = (buf[i] - 128) / 128; sum += v * v; }
            const rms = Math.min(1, Math.sqrt(sum / buf.length) * 2.2); setLevel(rms); setClip(rms > 0.92);
          } else {
            t += 0.08; const v = 0.32 + 0.26 * Math.sin(t * 1.7) + 0.12 * Math.sin(t * 5.3) + (Math.random() - 0.5) * 0.12;
            const lv = Math.max(0, Math.min(1, v)); setLevel(lv); setClip(lv > 0.92);
          }
        }
        rafRef.current = requestAnimationFrame(loop);
      };
      rafRef.current = requestAnimationFrame(loop);
    })();
    return () => { cancelled = true; if (rafRef.current) cancelAnimationFrame(rafRef.current); if (streamRef.current) streamRef.current.getTracks().forEach((x) => x.stop()); if (ctxRef.current) { try { ctxRef.current.close(); } catch (e) {} } };
  }, [active]);

  const seg = 24;
  return (
    <div className="meter">
      <div className="meter-bars">
        {Array.from({ length: seg }).map((_, i) => {
          const on = level * seg > i;
          const hot = i > seg * 0.82;
          return <span key={i} className={'meter-seg' + (on ? (hot ? ' on hot' : ' on') : '')} />;
        })}
        <span className={'meter-clip font-mono' + (clip ? ' flash' : '')}>clip</span>
      </div>
      <div className="meter-src font-mono">{src === 'mic' ? 'live mic' : 'simulated signal'}</div>
    </div>
  );
}

function makeWave() { return Array.from({ length: 40 }).map(() => 0.15 + Math.random() * 0.85); }

function LoopSlot({ slot, onArm, onStop, onFreeze, onMute, onClear }) {
  const { id, state, secs, muted, frozen, wave, grain } = slot;
  return (
    <div className={'slot' + (state !== 'empty' ? ' active' : '') + (frozen ? ' frozen' : '') + (muted ? ' muted' : '')}>
      <div className="slot-top">
        <span className="slot-id font-display">{id}</span>
        <span className="slot-state font-mono">
          {state === 'empty' && 'empty'}
          {state === 'armed' && 'armed · play to start'}
          {state === 'recording' && <span className="rec"><span className="rec-dot" /> rec {secs.toFixed(1)}s</span>}
          {state === 'playing' && (frozen ? 'frozen' : 'looping')}
        </span>
      </div>
      {(state === 'playing') && (
        <div className="slot-wave">{wave.map((h, i) => <span key={i} style={{ height: (h * 100) + '%' }} />)}</div>
      )}
      {state === 'frozen-controls' ? null : null}
      <div className="slot-controls font-mono">
        {state === 'empty' && <button onClick={() => onArm(id)}>Arm</button>}
        {state === 'armed' && <button onClick={() => onStop(id)}>Cancel</button>}
        {state === 'recording' && <button className="slot-stop" onClick={() => onStop(id)}>Stop</button>}
        {state === 'playing' && <>
          <button className={frozen ? 'on' : ''} onClick={() => onFreeze(id)} title="Freeze (granular)">❄</button>
          <button className={muted ? 'on' : ''} onClick={() => onMute(id)} title="Mute">{muted ? 'muted' : 'mute'}</button>
          <button onClick={() => onClear(id)} title="Clear"><Icon name="trash" size={12} /></button>
        </>}
      </div>
      {state === 'playing' && frozen && (
        <div className="grain-controls">
          {[['size', 'Grain', 30, 300, 'ms'], ['density', 'Density', 4, 40, '/s'], ['pos', 'Pos jitter', 0, 100, '%'], ['pitch', 'Pitch jitter', 0, 100, '¢']].map(([k, label, mn, mx, unit]) => (
            <div key={k} className="grain-row">
              <span className="grain-label font-mono">{label}</span>
              <Range value={grain[k]} min={mn} max={mx} step={1} disabled={false} onChange={() => {}} />
              <span className="grain-val font-mono tnum">{grain[k]}{unit}</span>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

function PerformDrawer({ open, onClose }) {
  const [conn, setConn] = useIlState('off'); // off | connecting | on
  const [device, setDevice] = useIlState(MOCK_DEVICES[0]);
  const [inputLevel, setInputLevel] = useIlState(0.7);
  const [monitoring, setMonitoring] = useIlState(false);
  const [slots, setSlots] = useIlState(SLOT_IDS.map((id) => ({ id, state: 'empty', secs: 0, muted: false, frozen: false, wave: [], grain: { size: 120, density: 18, pos: 35, pitch: 0 } })));
  const recRef = useIlRef(null);

  const connect = () => { setConn('connecting'); setTimeout(() => setConn('on'), 1400); };
  const disconnect = () => { setConn('off'); };

  const upd = (id, patch) => setSlots((ss) => ss.map((s) => s.id === id ? { ...s, ...patch } : s));
  const arm = (id) => { upd(id, { state: 'recording', secs: 0 }); startRec(id); };
  const startRec = (id) => {
    const t0 = performance.now();
    recRef.current = setInterval(() => {
      const secs = (performance.now() - t0) / 1000;
      setSlots((ss) => ss.map((s) => s.id === id ? { ...s, secs } : s));
      if (secs >= 60) stop(id);
    }, 100);
  };
  const stop = (id) => {
    if (recRef.current) { clearInterval(recRef.current); recRef.current = null; }
    setSlots((ss) => ss.map((s) => s.id === id ? (s.state === 'recording' && s.secs > 0.25 ? { ...s, state: 'playing', wave: makeWave() } : { ...s, state: 'empty', secs: 0 }) : s));
  };
  const freeze = (id) => upd(id, { frozen: !slots.find((s) => s.id === id).frozen });
  const mute = (id) => upd(id, { muted: !slots.find((s) => s.id === id).muted });
  const clear = (id) => upd(id, { state: 'empty', secs: 0, wave: [], frozen: false, muted: false });

  useIlEffect(() => () => { if (recRef.current) clearInterval(recRef.current); }, []);

  return (
    <div className={'perform' + (open ? ' is-open' : '')} role="dialog" aria-label="Perform" aria-hidden={!open}>
      <div className="perform-head">
        <span className="font-mono sculpt-title">Perform · live input &amp; loops</span>
        <button className="sculpt-x font-mono" onClick={onClose}>Done</button>
      </div>
      <div className="perform-grid">
        <div className="perform-input">
          <div className="sculpt-group font-mono">Live input</div>
          {conn === 'off' && (
            <div className="input-off">
              <p className="input-note font-body">Plug in an instrument or mic to blend it into the field. <strong>Use headphones</strong> — monitoring is off by default to avoid feedback.</p>
              <button className="pill font-mono input-connect" onClick={connect}>Connect input</button>
            </div>
          )}
          {conn === 'connecting' && <div className="input-connecting"><span className="ai-spinner" /><span className="font-mono">Requesting input…</span></div>}
          {conn === 'on' && (
            <div className="input-on">
