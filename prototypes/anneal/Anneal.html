<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Anneal</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@300;400;450;500;600;700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg:#090706; --surf:#141210; --border:#1c1917; --text:#e7e5e4; --muted:#a8a29e;
    --accent:hsl(38,90%,45%); --accent-soft:hsl(38,90%,83%); --accent-rgb:217,119,6; --hue:38;
    --body-weight:300; --head-weight:400; --line-height:1.75; --space:1.15;
    --ornament:0.08; --chrome:0.15; --motion:1.2; --easing:cubic-bezier(0.4,0,0.2,1); --type-scale:1;
    --nav-h:60px;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  html { height:100%; }
  body {
    min-height:100%; background:var(--bg); color:var(--text);
    font-family:'Geist',system-ui,sans-serif; font-weight:var(--body-weight);
    -webkit-font-smoothing:antialiased;
    transition:background calc(0.6s*var(--motion)) var(--easing);
  }
  body.immersive-route { overflow:hidden; height:100%; }
  .font-display{font-family:'Instrument Serif',Georgia,serif;}
  .font-body{font-family:'Geist',system-ui,sans-serif;}
  .font-mono{font-family:'Geist Mono',ui-monospace,monospace;}
  .tnum{font-variant-numeric:tabular-nums;}
  button{font-family:inherit;cursor:pointer;background:none;border:none;color:inherit;}
  ::selection{background:rgba(var(--accent-rgb),0.3);color:#fff;}
  button:focus-visible,input:focus-visible,textarea:focus-visible,[role=tab]:focus-visible{outline:2px solid var(--accent);outline-offset:3px;border-radius:3px;}

  .app{min-height:100vh;}
  .app.immersive{position:fixed;inset:0;height:100vh;overflow:hidden;}
  .screen-host{min-height:100vh;}
  .app.immersive .screen-host{position:absolute;inset:0;height:100vh;}

  /* chrome recede/lift (immersive only) */
  .chrome{opacity:1;transition:opacity calc(0.9s*var(--motion)) var(--easing);}
  .app.immersive .chrome{opacity:var(--chrome);}
  .app.immersive.chrome-lifted .chrome{opacity:1;}

  /* ───────── Top nav ───────── */
  .topnav{
    position:fixed;top:0;left:0;right:0;z-index:30;height:var(--nav-h);
    display:flex;align-items:center;justify-content:space-between;gap:18px;
    padding:0 calc(26px*var(--space));
    background:color-mix(in srgb,var(--bg) 86%,transparent);
    border-bottom:1px solid var(--border);
    backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  }
  .topnav.immersive{background:transparent;border-bottom:none;backdrop-filter:none;-webkit-backdrop-filter:none;}
  .brand{display:flex;align-items:center;}
  .wordmark{font-size:calc(26px*var(--type-scale));font-style:italic;line-height:1;color:var(--accent-soft);letter-spacing:-0.01em;}
  .nav-links{display:flex;gap:2px;}
  .nav-link{
    display:flex;align-items:center;gap:7px;padding:8px 14px;border-radius:999px;min-height:38px;
    font-size:calc(11px*var(--type-scale));text-transform:uppercase;letter-spacing:0.14em;color:var(--muted);
    transition:all calc(0.35s*var(--motion)) var(--easing);
  }
  .nav-link svg{opacity:0.7;transition:opacity .3s;}
  .nav-link:hover{color:var(--text);}
  .nav-link:hover svg{opacity:1;}
  .nav-link.is-active{color:var(--accent-soft);background:rgba(var(--accent-rgb),0.08);}
  .nav-link.is-active svg{opacity:1;color:var(--accent);}

  /* mode toggle */
  .mode-toggle{display:flex;gap:2px;padding:3px;background:rgba(var(--accent-rgb),0.05);border:1px solid var(--border);border-radius:999px;}
  .mode-tab{font-size:calc(10px*var(--type-scale));text-transform:uppercase;letter-spacing:0.14em;color:var(--muted);padding:6px 13px;border-radius:999px;min-height:32px;transition:all calc(0.4s*var(--motion)) var(--easing);}
  .mode-tab:hover{color:var(--text);}
  .mode-tab.is-active{color:var(--bg);background:var(--accent);box-shadow:0 0 22px rgba(var(--accent-rgb),0.32);}

  /* ───────── Visualizer + breath ───────── */
  .vis-canvas{position:absolute;inset:0;width:100%;height:100%;display:block;}
  .breath-layer{position:absolute;inset:0;z-index:3;pointer-events:none;}
  .breath-ring{position:absolute;left:50%;top:50%;border-radius:50%;border:1.5px solid rgba(var(--accent-rgb),0.5);}
  .breath-core{position:absolute;left:50%;top:50%;border-radius:50%;background:radial-gradient(circle,rgba(var(--accent-rgb),0.16),rgba(var(--accent-rgb),0) 70%);}
  .breath-label{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);font-size:calc(12px*var(--type-scale));text-transform:uppercase;letter-spacing:0.32em;color:var(--accent-soft);opacity:0.85;}

  /* ───────── Listen ───────── */
  .listen{position:absolute;inset:0;overflow:hidden;}
  .tagline{position:absolute;top:calc(var(--nav-h) + 30px);left:0;right:0;z-index:5;text-align:center;font-size:calc(14px*var(--type-scale));color:var(--muted);max-width:480px;margin:0 auto;line-height:var(--line-height);text-wrap:pretty;padding:0 24px;}
  .np-from{text-transform:uppercase;letter-spacing:0.2em;font-size:0.72em;color:var(--accent);margin-right:8px;}

  .bottombar{position:absolute;left:0;right:0;bottom:0;z-index:10;display:grid;grid-template-columns:1fr auto 1fr;align-items:center;padding:calc(24px*var(--space)) calc(30px*var(--space)) calc(44px*var(--space));gap:20px;}
  .status{display:flex;align-items:center;gap:10px;font-size:calc(10px*var(--type-scale));text-transform:uppercase;letter-spacing:0.16em;color:var(--muted);justify-self:start;white-space:nowrap;}
  .sdot{width:6px;height:6px;border-radius:50%;background:var(--border);transition:all .6s var(--easing);}
  .sdot.on{background:var(--accent);box-shadow:0 0 10px rgba(var(--accent-rgb),0.7);}
  .status-sep{color:var(--border);}
  .controls{justify-self:center;}
  .primary{display:inline-flex;align-items:center;gap:12px;padding:13px 26px 13px 22px;border-radius:999px;min-height:48px;background:rgba(var(--accent-rgb),0.05);border:1px solid color-mix(in srgb,var(--accent) 40%,transparent);color:var(--accent-soft);transition:all calc(0.5s*var(--motion)) var(--easing);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);}
  .primary:hover{background:rgba(var(--accent-rgb),0.12);box-shadow:0 0 40px rgba(var(--accent-rgb),0.2);}
  .primary:active{transform:scale(0.97);}
  .primary-glyph{display:flex;color:var(--accent);}
  .primary-label{font-size:calc(11px*var(--type-scale));text-transform:uppercase;letter-spacing:0.24em;}
  .actions{display:flex;gap:10px;justify-self:end;}
  .pill{font-size:calc(10px*var(--type-scale));text-transform:uppercase;letter-spacing:0.16em;color:var(--muted);padding:9px 15px;border-radius:999px;min-height:40px;border:1px solid var(--border);transition:all calc(0.4s*var(--motion)) var(--easing);}
  .pill:hover{color:var(--text);border-color:color-mix(in srgb,var(--accent) 40%,var(--border));}
  .pill.is-on{color:var(--accent-soft);border-color:var(--accent);background:rgba(var(--accent-rgb),0.08);}

  .breath-picker{position:absolute;left:50%;bottom:calc(106px*var(--space));transform:translateX(-50%);z-index:10;display:flex;gap:6px;padding:6px;background:rgba(0,0,0,0.35);border:1px solid var(--border);border-radius:999px;backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);}
  .breath-picker .bp{font-size:calc(9.5px*var(--type-scale));text-transform:uppercase;letter-spacing:0.12em;color:var(--muted);padding:6px 13px;border-radius:999px;min-height:32px;white-space:nowrap;display:flex;align-items:center;transition:all .4s var(--easing);}
  .breath-picker .bp:hover{color:var(--text);}
  .breath-picker .bp.is-on{color:var(--bg);background:var(--accent);}

  /* ───────── Sculpt drawer ───────── */
  .sculpt{position:absolute;left:0;right:0;bottom:0;z-index:20;padding:calc(24px*var(--space)) calc(38px*var(--space)) calc(32px*var(--space));background:color-mix(in srgb,var(--surf) 84%,transparent);border-top:1px solid var(--border);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);transform:translateY(106%);opacity:0;transition:transform calc(0.6s*var(--motion)) var(--easing),opacity calc(0.6s*var(--motion)) var(--easing);box-shadow:0 -30px 80px rgba(0,0,0,0.5);}
  .sculpt.is-open{transform:translateY(0);opacity:1;}
  .sculpt-head{display:flex;align-items:baseline;justify-content:space-between;margin:0 auto 22px;max-width:1040px;}
  .sculpt-title{font-size:calc(10px*var(--type-scale));text-transform:uppercase;letter-spacing:0.24em;color:var(--muted);}
  .sculpt-x{font-size:calc(10px*var(--type-scale));text-transform:uppercase;letter-spacing:0.2em;color:var(--accent-soft);padding:8px 16px;border:1px solid var(--border);border-radius:999px;min-height:36px;transition:all .4s var(--easing);}
  .sculpt-x:hover{border-color:var(--accent);}
  .sculpt-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:0 calc(46px*var(--space));max-width:1040px;margin:0 auto;}
  .sculpt-group{font-size:calc(9.5px*var(--type-scale));text-transform:uppercase;letter-spacing:0.24em;color:var(--muted);margin-bottom:18px;}
  .sculpt-rows{display:flex;flex-direction:column;gap:calc(17px*var(--space));}
  .sculpt-row{transition:all .3s var(--easing);border-radius:6px;}
  .sculpt-row.is-hot{box-shadow:0 0 0 1px var(--accent),0 0 22px rgba(var(--accent-rgb),0.25);padding:6px 8px;margin:-6px -8px;}
  .sculpt-row-top{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:8px;}
  .sculpt-label{font-size:calc(13px*var(--type-scale));color:var(--text);}
  .sculpt-label.is-disabled{color:#57534e;}
  .locked-tag{font-size:calc(8.5px*var(--type-scale));text-transform:uppercase;letter-spacing:0.18em;color:#57534e;margin-left:8px;}
  .sculpt-val{font-size:calc(11px*var(--type-scale));color:var(--accent-soft);}
  .sculpt-val.is-disabled{color:#57534e;}
  .sculpt-foot{max-width:1040px;margin:24px auto 0;padding-top:20px;border-top:1px solid var(--border);}
  .vol-row{display:flex;align-items:center;gap:16px;max-width:360px;}
  .vol-row .sculpt-group{margin-bottom:0;white-space:nowrap;}
  .vol-row .am-range{flex:1;}
  .vol-val{font-size:calc(11px*var(--type-scale));color:var(--muted);min-width:36px;text-align:right;}

  /* ───────── Range ───────── */
  .am-range{-webkit-appearance:none;appearance:none;width:100%;height:2px;background:var(--border);outline:none;border-radius:2px;cursor:pointer;}
  .am-range::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:13px;height:13px;border-radius:50%;background:var(--accent);cursor:pointer;box-shadow:0 0 0 3px rgba(var(--accent-rgb),0.12);transition:box-shadow .15s ease;}
  .am-range::-webkit-slider-thumb:hover{box-shadow:0 0 0 7px rgba(var(--accent-rgb),0.18);}
  .am-range::-moz-range-thumb{width:13px;height:13px;border-radius:50%;border:none;background:var(--accent);cursor:pointer;}
  .am-range:disabled{cursor:not-allowed;}
  .am-range:disabled::-webkit-slider-thumb{background:#57534e;box-shadow:none;cursor:not-allowed;}

  /* ───────── Chips ───────── */
  .chip{font-size:calc(10.5px*var(--type-scale));letter-spacing:0.04em;color:var(--muted);padding:8px 14px;border-radius:999px;min-height:36px;border:1px solid var(--border);background:transparent;transition:all .3s var(--easing);white-space:nowrap;}
  button.chip:hover{color:var(--text);border-color:color-mix(in srgb,var(--accent) 35%,var(--border));}
  .chip.is-active{color:var(--bg);background:var(--accent);border-color:var(--accent);}
  .chip-row{display:flex;flex-wrap:wrap;gap:8px;}

  /* ───────── Disclaimer ───────── */
  .disclaimer{position:absolute;left:50%;bottom:14px;transform:translateX(-50%);z-index:10;font-size:calc(9px*var(--type-scale));letter-spacing:0.06em;color:#57534e;text-align:center;max-width:92vw;opacity:0.7;pointer-events:none;}

  /* ───────── Breathe screen ───────── */
  .breathe{position:absolute;inset:0;overflow:hidden;display:flex;align-items:center;justify-content:center;}
  .breathe-setup{position:relative;z-index:8;max-width:560px;text-align:center;padding:0 28px;}
  .breathe-eyebrow{font-size:calc(10px*var(--type-scale));text-transform:uppercase;letter-spacing:0.26em;color:var(--accent);margin-bottom:18px;}
  .breathe-title{font-size:calc(40px*var(--type-scale));line-height:1.1;color:var(--text);margin-bottom:14px;font-style:italic;}
  .breathe-note{font-size:calc(14px*var(--type-scale));color:var(--muted);line-height:var(--line-height);max-width:420px;margin:0 auto 30px;text-wrap:pretty;}
  .breathe-group{margin-bottom:22px;}
  .breathe-label{font-size:calc(9.5px*var(--type-scale));text-transform:uppercase;letter-spacing:0.22em;color:var(--muted);margin-bottom:12px;}
  .breathe-group .chip-row{justify-content:center;}
  .breathe-begin{margin-top:14px;}
  .breathe-running{position:relative;z-index:8;text-align:center;}
  .breathe-timer{font-size:calc(64px*var(--type-scale));color:var(--accent-soft);letter-spacing:0.02em;line-height:1;}
  .breathe-pattern-name{font-size:calc(11px*var(--type-scale));text-transform:uppercase;letter-spacing:0.2em;color:var(--muted);margin-top:14px;}
  .breathe-end{margin-top:30px;}

  /* ───────── Pages (scroll surfaces) ───────── */
  .page{min-height:100vh;padding-top:var(--nav-h);}
  .page-inner{max-width:1080px;margin:0 auto;padding:calc(40px*var(--space)) 32px 100px;}
  .page-inner.narrow{max-width:680px;}
  .page-head{margin-bottom:36px;}
  .page-eyebrow{font-size:calc(10px*var(--type-scale));text-transform:uppercase;letter-spacing:0.26em;color:var(--accent);margin-bottom:14px;}
  .page-title{font-size:calc(40px*var(--type-scale));line-height:1.08;color:var(--text);font-style:italic;letter-spacing:-0.01em;margin-bottom:14px;text-wrap:balance;}
  .page-sub{font-size:calc(15px*var(--type-scale));color:var(--muted);max-width:560px;line-height:var(--line-height);text-wrap:pretty;}
  .section-label{font-size:calc(9.5px*var(--type-scale));text-transform:uppercase;letter-spacing:0.24em;color:var(--muted);margin:0 0 18px;}
  .empty{color:#57534e;font-size:calc(14px*var(--type-scale));}

  /* filters */
  .filters{display:flex;flex-direction:column;gap:18px;padding:24px 0 32px;border-bottom:1px solid var(--border);margin-bottom:32px;}
  .filter-group{display:flex;align-items:flex-start;gap:18px;}
  .filter-label{font-size:calc(9.5px*var(--type-scale));text-transform:uppercase;letter-spacing:0.2em;color:#57534e;min-width:84px;padding-top:9px;}

  /* library cards */
  .picks{margin-bottom:40px;}
  .lib-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:18px;}
  .lib-card{display:flex;flex-direction:column;background:var(--surf);border:1px solid var(--border);border-radius:14px;padding:22px;transition:all .35s var(--easing);}
  .lib-card:hover{border-color:color-mix(in srgb,var(--accent) 35%,var(--border));box-shadow:0 0 40px rgba(var(--accent-rgb),calc(0.07*var(--ornament) + 0.03));}
  .lib-card-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
  .lib-chips{display:flex;align-items:center;gap:10px;}
  .lib-intent{display:flex;align-items:center;gap:6px;font-size:calc(10px*var(--type-scale));text-transform:uppercase;letter-spacing:0.12em;color:var(--accent);}
  .lib-len{font-size:calc(10px*var(--type-scale));letter-spacing:0.1em;color:var(--muted);}
  .lib-pick{font-size:calc(8.5px*var(--type-scale));text-transform:uppercase;letter-spacing:0.16em;color:var(--accent-soft);border:1px solid color-mix(in srgb,var(--accent) 40%,transparent);padding:3px 8px;border-radius:999px;}
  .lib-title{font-size:calc(24px*var(--type-scale));color:var(--text);margin-bottom:8px;font-style:italic;line-height:1.1;}
  .lib-note{font-size:calc(13.5px*var(--type-scale));color:var(--muted);line-height:1.55;margin-bottom:16px;flex:1;text-wrap:pretty;}
  .lib-character{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:18px;}
  .lib-char{font-size:calc(9px*var(--type-scale));text-transform:uppercase;letter-spacing:0.1em;color:var(--muted);border:1px solid var(--border);padding:4px 9px;border-radius:6px;}
  .lib-actions{display:flex;gap:10px;align-items:center;}
  .lib-preview{font-size:calc(10px*var(--type-scale));text-transform:uppercase;letter-spacing:0.14em;color:var(--muted);padding:9px 14px;border-radius:999px;border:1px solid var(--border);min-height:38px;transition:all .3s var(--easing);}
  .lib-preview:hover{color:var(--text);border-color:var(--muted);}
  .lib-listen{display:flex;align-items:center;gap:7px;font-size:calc(10px*var(--type-scale));text-transform:uppercase;letter-spacing:0.14em;color:var(--bg);background:var(--accent);padding:9px 16px;border-radius:999px;min-height:38px;transition:all .3s var(--easing);}
  .lib-listen:hover{box-shadow:0 0 24px rgba(var(--accent-rgb),0.35);}

  /* ───────── History ───────── */
  .stats-card{background:var(--surf);border:1px solid var(--border);border-radius:14px;padding:22px 24px;margin-bottom:32px;}
  .stats-main{font-size:calc(15px*var(--type-scale));color:var(--text);}
  .stats-sub{font-size:calc(10.5px*var(--type-scale));text-transform:uppercase;letter-spacing:0.12em;color:#57534e;margin-top:6px;}
  .sess-list{list-style:none;display:flex;flex-direction:column;gap:14px;}
  .sess-item{background:var(--surf);border:1px solid var(--border);border-radius:14px;padding:18px 20px;}
  .sess-top{display:flex;align-items:flex-start;justify-content:space-between;gap:14px;}
  .sess-date{font-size:calc(9.5px*var(--type-scale));text-transform:uppercase;letter-spacing:0.12em;color:#57534e;}
  .sess-title{font-size:calc(17px*var(--type-scale));color:var(--text);margin:3px 0;}
  .sess-dur{font-size:calc(10.5px*var(--type-scale));color:var(--muted);letter-spacing:0.04em;}
  .sess-actions{display:flex;gap:8px;flex-shrink:0;}
  .sess-btn{display:flex;align-items:center;justify-content:center;width:36px;height:36px;border-radius:999px;border:1px solid var(--border);color:var(--muted);transition:all .3s var(--easing);}
  .sess-btn:hover{color:var(--accent);border-color:color-mix(in srgb,var(--accent) 50%,transparent);}
  .sess-btn.danger:hover{color:#fb7185;border-color:rgba(251,113,133,0.4);}
  .refl-add{font-size:calc(11px*var(--type-scale));color:#57534e;margin-top:14px;letter-spacing:0.04em;transition:color .3s;}
  .refl-add:hover{color:var(--accent);}
  .refl-view{margin-top:14px;padding-top:14px;border-top:1px solid var(--border);}
  .refl-text{font-size:calc(13.5px*var(--type-scale));color:var(--muted);line-height:1.6;font-style:italic;}
  .refl-edit{font-size:calc(10px*var(--type-scale));text-transform:uppercase;letter-spacing:0.12em;color:#57534e;margin-top:8px;}
  .refl-edit:hover{color:var(--accent);}
  .refl-edit-box{margin-top:14px;}
  .refl-area{width:100%;min-height:80px;background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:12px 14px;color:var(--text);font-size:calc(13.5px*var(--type-scale));line-height:1.6;resize:vertical;outline:none;}
  .refl-area:focus{border-color:color-mix(in srgb,var(--accent) 50%,var(--border));}
  .refl-controls{display:flex;align-items:center;gap:12px;margin-top:10px;justify-content:flex-end;}
  .refl-count{font-size:9px;color:#57534e;margin-right:auto;}
  .refl-cancel,.refl-save{font-size:calc(10px*var(--type-scale));text-transform:uppercase;letter-spacing:0.12em;padding:7px 14px;border-radius:999px;min-height:34px;}
  .refl-cancel{color:var(--muted);}
  .refl-save{color:var(--bg);background:var(--accent);}

  /* ───────── Learn browser ───────── */
  .offer{margin-bottom:40px;}
  .offer-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:16px;}
  .offer-card{display:flex;flex-direction:column;text-align:left;background:var(--surf);border:1px solid var(--border);border-radius:14px;padding:22px;transition:all .35s var(--easing);}
  .offer-card:hover{border-color:color-mix(in srgb,var(--accent) 40%,var(--border));transform:translateY(-2px);}
  .offer-track{font-size:calc(9px*var(--type-scale));text-transform:uppercase;letter-spacing:0.16em;color:var(--accent);margin-bottom:10px;}
  .offer-title{font-size:calc(22px*var(--type-scale));color:var(--text);font-style:italic;line-height:1.1;margin-bottom:8px;}
  .offer-why{font-size:calc(13px*var(--type-scale));color:var(--muted);line-height:1.5;flex:1;margin-bottom:16px;text-wrap:pretty;}
  .offer-go{font-size:calc(10px*var(--type-scale));text-transform:uppercase;letter-spacing:0.14em;color:var(--accent-soft);}
  .track{margin-bottom:34px;}
  .lesson-list{list-style:none;display:flex;flex-direction:column;}
  .lesson-row{display:flex;align-items:center;justify-content:space-between;gap:16px;padding:18px 4px;border-bottom:1px solid var(--border);cursor:pointer;transition:all .3s var(--easing);}
  .lesson-row:hover{padding-left:12px;padding-right:12px;background:rgba(var(--accent-rgb),0.03);border-radius:8px;border-bottom-color:transparent;}
  .lesson-meta{display:flex;align-items:flex-start;gap:14px;}
  .lesson-state{display:flex;align-items:center;justify-content:center;width:24px;height:24px;border-radius:50%;border:1px solid var(--border);color:#57534e;flex-shrink:0;margin-top:2px;}
  .lesson-state.done{color:var(--accent);border-color:color-mix(in srgb,var(--accent) 50%,transparent);background:rgba(var(--accent-rgb),0.08);}
  .lesson-title{font-size:calc(16px*var(--type-scale));color:var(--text);margin-bottom:3px;}
  .lesson-summary{font-size:calc(13px*var(--type-scale));color:var(--muted);line-height:1.5;max-width:480px;}
  .lesson-right{display:flex;align-items:center;gap:14px;flex-shrink:0;font-size:calc(9.5px*var(--type-scale));text-transform:uppercase;letter-spacing:0.12em;color:#57534e;}
  .lesson-resume{color:var(--accent);}
  .learn-count{font-size:calc(10px*var(--type-scale));text-transform:uppercase;letter-spacing:0.16em;color:#57534e;text-align:center;margin-top:20px;}

  /* progress dots */
  .dots{display:flex;gap:7px;align-items:center;}
  .dots .dot{width:7px;height:7px;border-radius:50%;border:1px solid var(--muted);background:transparent;transition:all .4s var(--easing);}
  .dots .dot.filled{background:var(--accent);border-color:var(--accent);}

  /* ───────── Lesson player ───────── */
  .lesson-player{min-height:100vh;padding-top:var(--nav-h);}
  .player-bar{display:flex;align-items:center;justify-content:space-between;gap:16px;max-width:1180px;margin:0 auto;padding:24px 32px 0;}
  .player-back{display:flex;align-items:center;gap:7px;font-size:calc(10px*var(--type-scale));text-transform:uppercase;letter-spacing:0.14em;color:var(--muted);}
  .player-back:hover{color:var(--accent);}
  .player-lesson{font-size:calc(10px*var(--type-scale));text-transform:uppercase;letter-spacing:0.14em;color:var(--text);}
  .player-split{display:grid;grid-template-columns:1fr 1fr;gap:40px;max-width:1180px;margin:0 auto;padding:32px;align-items:start;}
  .player-left{display:flex;flex-direction:column;min-height:420px;}
  .step-body{flex:1;}
  .step-kind{font-size:calc(9.5px*var(--type-scale));text-transform:uppercase;letter-spacing:0.22em;color:var(--accent);}
  .step-title{font-size:calc(30px*var(--type-scale));color:var(--text);font-style:italic;line-height:1.12;margin:12px 0 18px;text-wrap:balance;}
  .step-text{font-size:calc(15.5px*var(--type-scale));color:var(--muted);line-height:1.7;text-wrap:pretty;}
  .takeaways{list-style:none;margin-top:22px;display:flex;flex-direction:column;gap:12px;}
  .takeaways li{display:flex;align-items:flex-start;gap:12px;font-size:calc(14px*var(--type-scale));color:var(--text);line-height:1.5;}
  .tk-dot{width:6px;height:6px;border-radius:50%;background:var(--accent);margin-top:8px;flex-shrink:0;}
  .step-hint{font-size:calc(11px*var(--type-scale));color:#57534e;letter-spacing:0.04em;margin-top:20px;font-style:normal;}
  .learn-refl{margin-top:18px;min-height:120px;}
  .player-nav{display:flex;align-items:center;justify-content:space-between;margin-top:30px;padding-top:22px;border-top:1px solid var(--border);}
  .pnav-prev,.pnav-next{display:flex;align-items:center;gap:8px;font-size:calc(10.5px*var(--type-scale));text-transform:uppercase;letter-spacing:0.14em;padding:11px 20px;border-radius:999px;min-height:42px;transition:all .3s var(--easing);}
  .pnav-prev{color:var(--muted);border:1px solid var(--border);}
  .pnav-prev:disabled{opacity:0.35;cursor:not-allowed;}
  .pnav-prev:not(:disabled):hover{color:var(--text);border-color:var(--muted);}
  .pnav-next{color:var(--bg);background:var(--accent);}
  .pnav-next:hover{box-shadow:0 0 26px rgba(var(--accent-rgb),0.35);}

  /* instrument panel */
  .player-right{position:sticky;top:calc(var(--nav-h) + 24px);}
  .instrument{background:var(--surf);border:1px solid var(--border);border-radius:16px;overflow:hidden;}
  .instrument-vis{position:relative;height:200px;background:var(--bg);}
  .inst-play{position:absolute;left:50%;bottom:16px;transform:translateX(-50%);display:flex;align-items:center;gap:8px;padding:9px 18px;border-radius:999px;background:rgba(var(--accent-rgb),0.08);border:1px solid color-mix(in srgb,var(--accent) 40%,transparent);color:var(--accent-soft);font-size:calc(10px*var(--type-scale));text-transform:uppercase;letter-spacing:0.16em;min-height:38px;backdrop-filter:blur(8px);transition:all .3s var(--easing);}
  .inst-play:hover{background:rgba(var(--accent-rgb),0.16);}
  .inst-controls{padding:20px 22px;display:flex;flex-direction:column;gap:15px;}
  .inst-row{transition:all .3s var(--easing);border-radius:6px;}
  .inst-row.locked{opacity:0.4;}
  .inst-row.hot{box-shadow:0 0 0 1px var(--accent),0 0 22px rgba(var(--accent-rgb),0.25);padding:7px 9px;margin:-7px -9px;animation:hotpulse 1.4s var(--easing) infinite;}
  @keyframes hotpulse{0%,100%{box-shadow:0 0 0 1px var(--accent),0 0 14px rgba(var(--accent-rgb),0.18);}50%{box-shadow:0 0 0 1px var(--accent),0 0 28px rgba(var(--accent-rgb),0.4);}}
  .inst-row-top{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:7px;}
  .inst-label{font-size:calc(12px*var(--type-scale));color:var(--text);}
  .inst-lock{font-size:8px;text-transform:uppercase;letter-spacing:0.16em;color:var(--accent);margin-left:8px;}
  .inst-val{font-size:calc(10.5px*var(--type-scale));color:var(--accent-soft);}

  /* ───────── Onboarding ───────── */
  .onboard{position:absolute;inset:0;overflow:hidden;display:flex;align-items:center;justify-content:center;}
  .onboard-vis{position:absolute;inset:0;opacity:0.55;}
  .onboard-content{position:relative;z-index:5;width:100%;max-width:880px;padding:0 32px;display:flex;flex-direction:column;align-items:center;}
  .onboard-panel{text-align:center;max-width:560px;animation:fadeUp .8s var(--easing);}
  .onboard-panel.wide{max-width:880px;}
  @keyframes fadeUp{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}
  .onboard-eyebrow{font-size:calc(10px*var(--type-scale));text-transform:uppercase;letter-spacing:0.28em;color:var(--accent);margin-bottom:20px;}
  .onboard-word{font-size:calc(76px*var(--type-scale));font-style:italic;line-height:1;color:var(--accent-soft);margin-bottom:24px;letter-spacing:-0.02em;}
  .onboard-lede{font-size:calc(17px*var(--type-scale));color:var(--muted);line-height:1.7;margin-bottom:36px;text-wrap:pretty;}
  .onboard-h2{font-size:calc(38px*var(--type-scale));font-style:italic;line-height:1.12;color:var(--text);margin-bottom:12px;}
  .onboard-sub{font-size:calc(14px*var(--type-scale));color:var(--muted);margin-bottom:30px;}
  .onboard-cta{margin-top:8px;}
  .voice-cards{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin:0 0 34px;}
  .voice-card{position:relative;text-align:left;background:color-mix(in srgb,var(--surf) 70%,transparent);border:1px solid var(--border);border-radius:16px;padding:24px;transition:all .4s var(--easing);backdrop-filter:blur(8px);}
  .voice-card:hover{border-color:var(--muted);transform:translateY(-3px);}
  .voice-card.is-active{border-color:var(--accent);background:rgba(var(--accent-rgb),0.07);box-shadow:0 0 40px rgba(var(--accent-rgb),0.18);}
  .voice-name{display:block;font-size:calc(26px*var(--type-scale));font-style:italic;color:var(--text);margin-bottom:12px;}
  .voice-blurb{display:block;font-size:calc(13.5px*var(--type-scale));color:var(--muted);line-height:1.6;text-wrap:pretty;}
  .voice-check{position:absolute;top:18px;right:18px;width:22px;height:22px;border-radius:50%;border:1px solid var(--border);display:flex;align-items:center;justify-content:center;color:var(--bg);transition:all .3s var(--easing);}
  .voice-check.on{background:var(--accent);border-color:var(--accent);}
  .promises{list-style:none;text-align:left;max-width:440px;margin:0 auto 28px;display:flex;flex-direction:column;gap:14px;}
  .promises li{display:flex;align-items:center;gap:14px;font-size:calc(15px*var(--type-scale));color:var(--text);}
  .promise-x{display:flex;align-items:center;justify-content:center;width:24px;height:24px;border-radius:50%;border:1px solid var(--border);color:var(--muted);flex-shrink:0;}
  .onboard-fine{font-size:calc(13px*var(--type-scale));color:var(--muted);line-height:1.7;max-width:440px;margin:0 auto 32px;text-wrap:pretty;}
  .onboard-dots{display:flex;align-items:center;gap:10px;margin-top:46px;}
  .onboard-dots .dot{width:8px;height:8px;border-radius:50%;border:1px solid var(--muted);cursor:pointer;transition:all .4s var(--easing);}
  .onboard-dots .dot.filled{background:var(--accent);border-color:var(--accent);}
  .onboard-skip{margin-left:14px;font-size:calc(10px*var(--type-scale));text-transform:uppercase;letter-spacing:0.16em;color:#57534e;}
  .onboard-skip:hover{color:var(--muted);}

  /* ───────── Sounds ───────── */
  .sounds-head{display:flex;align-items:flex-start;justify-content:space-between;gap:24px;flex-wrap:wrap;}
  .sounds-actions{display:flex;flex-wrap:wrap;gap:10px;padding-top:6px;}
  .sounds-ai,.sounds-save,.sounds-export{font-size:calc(10px*var(--type-scale));text-transform:uppercase;letter-spacing:0.14em;padding:10px 16px;border-radius:999px;min-height:40px;border:1px solid var(--border);color:var(--muted);display:flex;align-items:center;gap:8px;transition:all .3s var(--easing);white-space:nowrap;}
  .sounds-ai{color:var(--accent-soft);border-color:color-mix(in srgb,var(--accent) 45%,transparent);background:rgba(var(--accent-rgb),0.06);}
  .sounds-ai:hover{background:rgba(var(--accent-rgb),0.14);box-shadow:0 0 24px rgba(var(--accent-rgb),0.2);}
  .sounds-save:hover,.sounds-export:hover{color:var(--text);border-color:var(--muted);}
  .ai-spark{width:9px;height:9px;background:var(--accent);border-radius:1px;transform:rotate(45deg);box-shadow:0 0 10px rgba(var(--accent-rgb),0.6);display:inline-block;}
  .ai-spark.sm{width:7px;height:7px;}
  .engine-row{display:flex;align-items:center;flex-wrap:wrap;gap:8px;padding:0 0 30px;border-bottom:1px solid var(--border);margin-bottom:32px;}
  .engine-blurb{font-size:calc(12.5px*var(--type-scale));color:var(--muted);margin-left:8px;}
  .patch-section{margin-bottom:38px;}
  .section-desc{font-family:'Geist',sans-serif;text-transform:none;letter-spacing:0;color:#57534e;margin-left:14px;font-size:calc(12px*var(--type-scale));}
  .patch-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(252px,1fr));gap:16px;}
  .patch-card{display:flex;flex-direction:column;background:var(--surf);border:1px solid var(--border);border-radius:14px;padding:20px;transition:all .35s var(--easing);}
  .patch-card:hover{border-color:color-mix(in srgb,var(--accent) 32%,var(--border));}
  .patch-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
  .eng-badge{font-size:calc(8.5px*var(--type-scale));text-transform:uppercase;letter-spacing:0.16em;color:var(--accent);border:1px solid color-mix(in srgb,var(--accent) 35%,transparent);padding:3px 8px;border-radius:6px;}
  .patch-del{display:flex;width:24px;height:24px;align-items:center;justify-content:center;border-radius:50%;color:#57534e;transition:all .3s;}
  .patch-del:hover{color:#fb7185;}
  .patch-name{font-size:calc(22px*var(--type-scale));color:var(--text);font-style:italic;line-height:1.1;margin-bottom:7px;}
  .patch-desc{font-size:calc(13px*var(--type-scale));color:var(--muted);line-height:1.5;flex:1;margin-bottom:16px;text-wrap:pretty;}
  .patch-actions{display:flex;gap:10px;align-items:center;}
  .patch-aud{font-size:calc(9.5px*var(--type-scale));text-transform:uppercase;letter-spacing:0.14em;color:var(--muted);padding:8px 13px;border-radius:999px;border:1px solid var(--border);min-height:36px;transition:all .3s var(--easing);}
  .patch-aud:hover{color:var(--text);border-color:var(--muted);}
  .patch-open{display:flex;align-items:center;gap:6px;font-size:calc(9.5px*var(--type-scale));text-transform:uppercase;letter-spacing:0.14em;color:var(--bg);background:var(--accent);padding:8px 14px;border-radius:999px;min-height:36px;transition:all .3s var(--easing);}
  .patch-open:hover{box-shadow:0 0 22px rgba(var(--accent-rgb),0.35);}

  /* ───────── Modals (AI / Save / Export) ───────── */
  .modal-scrim{position:fixed;inset:0;z-index:60;display:flex;align-items:center;justify-content:center;padding:24px;background:rgba(0,0,0,0.7);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);animation:scrimIn .25s var(--easing);}
  @keyframes scrimIn{from{opacity:0;}to{opacity:1;}}
  .modal{width:100%;max-width:460px;background:color-mix(in srgb,var(--surf) 96%,#000);border:1px solid var(--border);border-radius:18px;padding:24px;box-shadow:0 30px 70px rgba(0,0,0,0.6);animation:modalIn .3s var(--easing);}
  @keyframes modalIn{from{opacity:0;transform:translateY(12px) scale(0.98);}to{opacity:1;transform:none;}}
  .modal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;}
  .modal-title{display:flex;align-items:center;gap:9px;font-size:calc(10.5px*var(--type-scale));text-transform:uppercase;letter-spacing:0.2em;color:var(--accent-soft);}
  .modal-x{display:flex;width:28px;height:28px;align-items:center;justify-content:center;border-radius:50%;color:var(--muted);transition:all .3s;}
  .modal-x:hover{color:var(--text);background:rgba(255,255,255,0.05);}
  .ai-body{display:flex;flex-direction:column;}
  .ai-label{font-size:calc(9.5px*var(--type-scale));text-transform:uppercase;letter-spacing:0.16em;color:var(--muted);margin-bottom:10px;}
  .ai-input{margin-bottom:18px;}
  .ai-sug-label{font-size:calc(8.5px*var(--type-scale));text-transform:uppercase;letter-spacing:0.16em;color:#57534e;margin-bottom:10px;}
  .ai-sugs{display:flex;flex-direction:column;gap:8px;margin-bottom:18px;}
  .ai-sug{text-align:left;font-size:calc(12px*var(--type-scale));color:var(--muted);padding:9px 12px;border-radius:9px;background:rgba(255,255,255,0.02);border:1px solid var(--border);transition:all .3s var(--easing);line-height:1.4;}
  .ai-sug:hover{color:var(--text);border-color:var(--muted);}
  .ai-quota{display:flex;justify-content:space-between;align-items:center;font-size:calc(9.5px*var(--type-scale));color:#57534e;padding:10px 12px;border-radius:9px;background:var(--bg);border:1px solid var(--border);margin-bottom:18px;}
  .ai-quota-n{color:var(--muted);}
  .modal-actions{display:flex;justify-content:flex-end;gap:10px;}
  .modal-actions.center{justify-content:center;}
  .modal-cancel{font-size:calc(10px*var(--type-scale));text-transform:uppercase;letter-spacing:0.16em;color:var(--muted);padding:10px 16px;border-radius:999px;border:1px solid var(--border);min-height:40px;}
  .modal-cancel:hover{color:var(--text);}
  .modal-go{display:flex;align-items:center;gap:8px;font-size:calc(10px*var(--type-scale));text-transform:uppercase;letter-spacing:0.16em;color:var(--bg);background:var(--accent);padding:10px 18px;border-radius:999px;min-height:40px;transition:all .3s var(--easing);}
  .modal-go:hover{box-shadow:0 0 24px rgba(var(--accent-rgb),0.35);}
  .modal-go:disabled{opacity:0.4;cursor:not-allowed;box-shadow:none;}
  .ai-loading{padding:30px 10px;text-align:center;display:flex;flex-direction:column;align-items:center;}
  .ai-spinner{width:46px;height:46px;border-radius:50%;border:2px solid rgba(var(--accent-rgb),0.2);border-top-color:var(--accent);animation:spin 0.9s linear infinite;margin-bottom:18px;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .ai-load-main{font-size:calc(11px*var(--type-scale));text-transform:uppercase;letter-spacing:0.16em;color:var(--accent-soft);margin-bottom:8px;}
  .ai-load-sub{font-size:calc(13px*var(--type-scale));color:var(--muted);max-width:300px;line-height:1.55;}
  .save-input,.ex-seed{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:12px 14px;color:var(--text);font-size:calc(14px*var(--type-scale));outline:none;margin-bottom:14px;}
  .save-input:focus,.ex-seed:focus{border-color:color-mix(in srgb,var(--accent) 50%,var(--border));}
  .save-note{font-size:calc(12px*var(--type-scale));color:#57534e;line-height:1.5;margin-bottom:18px;}

  /* ───────── Attune (biofeedback) ───────── */
  .device-list{list-style:none;display:flex;flex-direction:column;gap:10px;margin-bottom:24px;}
  .device-row{display:flex;align-items:center;justify-content:space-between;gap:14px;padding:16px 18px;background:var(--surf);border:1px solid var(--border);border-radius:12px;cursor:pointer;transition:all .3s var(--easing);}
  .device-row:hover{border-color:color-mix(in srgb,var(--accent) 40%,var(--border));transform:translateX(3px);}
  .device-meta{display:flex;align-items:center;gap:14px;}
  .device-led{width:9px;height:9px;border-radius:50%;background:var(--accent);box-shadow:0 0 10px rgba(var(--accent-rgb),0.6);flex-shrink:0;}
  .device-led.cap-eeg{background:hsl(calc(var(--hue) - 18),80%,55%);box-shadow:0 0 10px hsl(calc(var(--hue) - 18),80%,55%);}
  .device-led.cap-gsr{background:hsl(calc(var(--hue) + 14),70%,52%);box-shadow:0 0 10px hsl(calc(var(--hue) + 14),70%,52%);}
  .device-name{font-size:calc(15px*var(--type-scale));color:var(--text);display:flex;align-items:center;gap:10px;}
  .device-rec{font-size:calc(8px*var(--type-scale));text-transform:uppercase;letter-spacing:0.14em;color:var(--accent);border:1px solid color-mix(in srgb,var(--accent) 40%,transparent);padding:2px 7px;border-radius:999px;}
  .device-sub{font-size:calc(10.5px*var(--type-scale));color:var(--muted);margin-top:3px;letter-spacing:0.04em;}
  .device-go{display:flex;align-items:center;gap:6px;font-size:calc(9.5px*var(--type-scale));text-transform:uppercase;letter-spacing:0.14em;color:var(--muted);flex-shrink:0;}
  .device-row:hover .device-go{color:var(--accent);}
  .consent{display:flex;gap:12px;align-items:flex-start;padding:16px 18px;background:rgba(var(--accent-rgb),0.03);border:1px solid var(--border);border-radius:12px;}
  .consent input,.ex-check input{margin-top:3px;accent-color:var(--accent);width:16px;height:16px;flex-shrink:0;}
  .consent span{font-size:calc(12.5px*var(--type-scale));color:var(--muted);line-height:1.55;}
  .attune-status{text-align:center;padding:48px 20px;display:flex;flex-direction:column;align-items:center;}
  .connect-spinner{width:54px;height:54px;border-radius:50%;border:2px solid rgba(var(--accent-rgb),0.18);border-top-color:var(--accent);animation:spin 0.9s linear infinite;margin-bottom:22px;}
  .connect-ok{width:54px;height:54px;border-radius:50%;border:1px solid color-mix(in srgb,var(--accent) 50%,transparent);background:rgba(var(--accent-rgb),0.1);color:var(--accent);display:flex;align-items:center;justify-content:center;margin-bottom:22px;}
  .attune-status-main{font-size:calc(13px*var(--type-scale));text-transform:uppercase;letter-spacing:0.16em;color:var(--text);margin-bottom:10px;}
  .attune-status-sub{font-size:calc(14px*var(--type-scale));color:var(--muted);max-width:380px;line-height:1.6;text-wrap:pretty;}
  .attune-cal{margin-top:26px;}
  .attune-skip{margin-top:16px;font-size:calc(10px*var(--type-scale));text-transform:uppercase;letter-spacing:0.14em;color:#57534e;}
  .attune-skip:hover{color:var(--muted);}
  .cal-ring{width:130px;height:130px;border-radius:50%;background:conic-gradient(var(--accent) calc(var(--p)*360deg),var(--border) 0);display:flex;align-items:center;justify-content:center;margin-bottom:22px;position:relative;}
  .cal-ring::after{content:'';position:absolute;inset:8px;border-radius:50%;background:var(--bg);}
  .cal-pct{position:relative;z-index:1;font-size:calc(22px*var(--type-scale));color:var(--accent-soft);}
  .cal-live{margin-top:16px;font-size:calc(28px*var(--type-scale));color:var(--muted);}
  .cal-unit{font-size:0.5em;letter-spacing:0.1em;}
  .attune-live{display:flex;flex-direction:column;align-items:center;}
  .live-pulse-wrap{position:relative;width:160px;height:160px;display:flex;align-items:center;justify-content:center;margin-bottom:8px;}
  .live-pulse{position:absolute;width:120px;height:120px;border-radius:50%;background:radial-gradient(circle,rgba(var(--accent-rgb),0.28),rgba(var(--accent-rgb),0) 70%);border:1.5px solid color-mix(in srgb,var(--accent) 55%,transparent);animation:beat 1s var(--easing) infinite;}
  @keyframes beat{0%,100%{transform:scale(0.82);opacity:0.55;}14%{transform:scale(1.12);opacity:1;}30%{transform:scale(0.94);opacity:0.8;}}
  .live-bpm{position:relative;z-index:1;font-size:calc(46px*var(--type-scale));color:var(--accent-soft);line-height:1;}
  .live-bpm-unit{position:absolute;bottom:34px;font-size:calc(9px*var(--type-scale));text-transform:uppercase;letter-spacing:0.16em;color:var(--muted);}
  .tele-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;width:100%;margin:18px 0 30px;}
  .tele{display:flex;flex-direction:column;gap:6px;padding:14px;background:var(--surf);border:1px solid var(--border);border-radius:11px;text-align:center;}
  .tele-k{font-size:calc(8.5px*var(--type-scale));text-transform:uppercase;letter-spacing:0.12em;color:#57534e;}
  .tele-v{font-size:calc(15px*var(--type-scale));color:var(--text);}
  .map-section{width:100%;margin-bottom:24px;}
  .map-section .chip-row{margin-bottom:14px;}
  .map-desc{font-size:calc(13px*var(--type-scale));color:var(--muted);line-height:1.55;margin-bottom:16px;text-wrap:pretty;}
  .map-meter{display:flex;align-items:center;gap:14px;}
  .map-meter-label{font-size:calc(10px*var(--type-scale));text-transform:uppercase;letter-spacing:0.14em;color:var(--muted);min-width:84px;}
  .map-bar{flex:1;height:6px;background:var(--border);border-radius:999px;overflow:hidden;}
  .map-fill{height:100%;background:var(--accent);border-radius:999px;transition:width .18s linear;box-shadow:0 0 12px rgba(var(--accent-rgb),0.5);}
  .map-meter-val{font-size:calc(12px*var(--type-scale));color:var(--accent-soft);min-width:40px;text-align:right;}
  .live-controls{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;margin-bottom:18px;}
  .danger-pill:hover{color:#fb7185;border-color:rgba(251,113,133,0.4);}
  .disclaimer-inline{font-size:calc(9px*var(--type-scale));color:#57534e;letter-spacing:0.06em;text-align:center;}

  /* ───────── Export ───────── */
  .ex-formats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:18px;}
  .ex-format{display:flex;flex-direction:column;gap:4px;padding:13px;border-radius:11px;border:1px solid var(--border);background:transparent;transition:all .3s var(--easing);text-align:center;}
  .ex-format:hover{border-color:var(--muted);}
  .ex-format.is-active{border-color:var(--accent);background:rgba(var(--accent-rgb),0.08);}
  .ex-format-label{font-size:calc(12px*var(--type-scale));text-transform:uppercase;letter-spacing:0.12em;color:var(--text);}
  .ex-format-sub{font-size:calc(10px*var(--type-scale));color:var(--muted);}
  .ex-seed-label{margin-top:4px;}
  .ex-seed-note{text-transform:none;letter-spacing:0;color:#57534e;}
  .ex-seed-row{display:flex;gap:10px;align-items:center;}
  .ex-seed{margin-bottom:0;flex:1;}
  .ex-reseed{font-size:calc(9.5px*var(--type-scale));text-transform:uppercase;letter-spacing:0.14em;color:var(--muted);padding:11px 14px;border-radius:10px;border:1px solid var(--border);white-space:nowrap;min-height:44px;}
  .ex-reseed:hover{color:var(--text);border-color:var(--muted);}
  .ex-check{display:flex;gap:11px;align-items:flex-start;margin:16px 0;}
  .ex-check span{font-size:calc(12.5px*var(--type-scale));color:var(--muted);line-height:1.5;}
  .ex-summary{display:flex;justify-content:space-between;font-size:calc(11px*var(--type-scale));color:var(--muted);padding:12px 0;border-top:1px solid var(--border);border-bottom:1px solid var(--border);margin-bottom:18px;}
  .ex-size{color:var(--accent-soft);}
  .ex-rendering{padding:30px 6px;text-align:center;}
  .ex-render-main{font-size:calc(11px*var(--type-scale));text-transform:uppercase;letter-spacing:0.14em;color:var(--accent-soft);margin-bottom:18px;}
  .ex-prog{height:6px;background:var(--border);border-radius:999px;overflow:hidden;margin-bottom:14px;}
  .ex-prog-fill{height:100%;background:var(--accent);border-radius:999px;box-shadow:0 0 12px rgba(var(--accent-rgb),0.5);transition:width .06s linear;}
  .ex-render-sub{font-size:calc(11px*var(--type-scale));color:var(--muted);}
  .ex-done{text-align:center;align-items:center;}
  .ex-done-ic{width:50px;height:50px;border-radius:50%;border:1px solid color-mix(in srgb,var(--accent) 50%,transparent);background:rgba(var(--accent-rgb),0.1);color:var(--accent);display:flex;align-items:center;justify-content:center;margin:6px auto 16px;}
  .ex-done-main{font-size:calc(26px*var(--type-scale));font-style:italic;color:var(--text);margin-bottom:10px;}
  .ex-done-sub{font-size:calc(12.5px*var(--type-scale));color:var(--muted);margin-bottom:22px;line-height:1.5;}

  /* ───────── topnav right + gear ───────── */
  .topnav-right{display:flex;align-items:center;gap:12px;flex-shrink:0;}
  .gear-btn{display:flex;align-items:center;justify-content:center;width:36px;height:36px;border-radius:50%;border:1px solid var(--border);color:var(--muted);transition:all .3s var(--easing);flex-shrink:0;}
  .gear-btn:hover{color:var(--text);border-color:var(--muted);}
  .gear-btn.is-active{color:var(--accent);border-color:color-mix(in srgb,var(--accent) 50%,transparent);background:rgba(var(--accent-rgb),0.08);}
  .nav-links{flex-wrap:nowrap;overflow-x:auto;overflow-y:hidden;min-width:0;scrollbar-width:none;}
  .nav-links::-webkit-scrollbar{display:none;}

  /* ───────── Gallery ───────── */
  .gallery-controls{display:flex;align-items:center;justify-content:space-between;gap:18px;flex-wrap:wrap;margin-bottom:16px;}
  .search-wrap{display:flex;align-items:center;gap:10px;flex:1;min-width:220px;max-width:380px;padding:0 16px;height:44px;background:var(--surf);border:1px solid var(--border);border-radius:999px;color:var(--muted);}
  .search-input{flex:1;background:none;border:none;outline:none;color:var(--text);font-size:calc(14px*var(--type-scale));}
  .search-input::placeholder{color:#57534e;}
  .sort-chips{justify-content:flex-end;}
  .gallery-filters{display:flex;align-items:center;flex-wrap:wrap;gap:8px;padding:0 0 28px;border-bottom:1px solid var(--border);margin-bottom:30px;}
  .filter-label-2{margin-left:18px;}
  .gallery-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:18px;}
  .gcard{display:flex;flex-direction:column;background:var(--surf);border:1px solid var(--border);border-radius:14px;overflow:hidden;transition:all .35s var(--easing);}
  .gcard:hover{border-color:color-mix(in srgb,var(--accent) 32%,var(--border));}
  .gcard-vis{position:relative;height:128px;overflow:hidden;}
  .gcard-halo{position:absolute;inset:0;background:radial-gradient(circle at 50% 50%,rgba(var(--accent-rgb),0.18),transparent 65%);}
  .gcard-dot{position:absolute;border-radius:50%;transform:translate(-50%,-50%);background:radial-gradient(circle,rgba(254,215,170,0.9),rgba(var(--accent-rgb),0.2) 60%,transparent);}
  .gcard-body{padding:18px 20px 20px;display:flex;flex-direction:column;flex:1;}
  .gcard-badges{display:flex;align-items:center;gap:8px;margin-bottom:12px;}
  .gcard-mode{font-size:calc(8.5px*var(--type-scale));text-transform:uppercase;letter-spacing:0.14em;color:var(--muted);}
  .gcard-cap{font-size:calc(8px*var(--type-scale));text-transform:uppercase;letter-spacing:0.14em;color:var(--accent-soft);border:1px solid var(--border);padding:2px 7px;border-radius:999px;}
  .gcard-title{font-size:calc(22px*var(--type-scale));color:var(--text);font-style:italic;line-height:1.1;margin-bottom:7px;}
  .gcard-desc{font-size:calc(12.5px*var(--type-scale));color:var(--muted);line-height:1.5;flex:1;margin-bottom:16px;text-wrap:pretty;}
  .gcard-foot{display:flex;align-items:center;justify-content:space-between;gap:10px;}
  .gcard-loads{font-size:calc(9.5px*var(--type-scale));color:#57534e;letter-spacing:0.04em;}
  .gcard-actions{display:flex;align-items:center;gap:6px;position:relative;}
  .gcard-prev,.gcard-prev-na{display:flex;align-items:center;justify-content:center;width:32px;height:32px;border-radius:50%;border:1px solid var(--border);color:var(--accent);font-size:10px;transition:all .3s var(--easing);}
  .gcard-prev:hover{border-color:var(--accent);}
  .gcard-prev-na{color:#57534e;}
  .gcard-remix{font-size:calc(9.5px*var(--type-scale));text-transform:uppercase;letter-spacing:0.12em;color:var(--text);border:1px solid var(--border);padding:7px 12px;border-radius:999px;min-height:32px;transition:all .3s var(--easing);}
  .gcard-remix:hover{border-color:var(--accent);color:var(--accent-soft);}
  .gcard-more{width:32px;height:32px;border-radius:50%;color:var(--muted);font-size:14px;line-height:1;transition:all .3s;}
  .gcard-more:hover{color:var(--text);background:rgba(255,255,255,0.05);}
  .gcard-menu-wrap{position:relative;}
  .gcard-menu{position:absolute;right:0;bottom:38px;z-index:12;display:flex;flex-direction:column;min-width:150px;background:color-mix(in srgb,var(--surf) 96%,#000);border:1px solid var(--border);border-radius:10px;overflow:hidden;box-shadow:0 16px 40px rgba(0,0,0,0.5);}
  .gcard-menu button{text-align:left;padding:10px 14px;font-size:calc(10px*var(--type-scale));text-transform:uppercase;letter-spacing:0.1em;color:var(--muted);transition:all .2s;}
  .gcard-menu button:hover{background:rgba(255,255,255,0.04);color:var(--text);}
  .gcard-menu-report:hover{color:#fb7185 !important;}

  /* ───────── Settings ───────── */
  .set-card{background:var(--surf);border:1px solid var(--border);border-radius:14px;padding:22px 24px;margin-bottom:18px;}
  .set-card-head{display:flex;align-items:center;gap:10px;font-size:calc(10px*var(--type-scale));text-transform:uppercase;letter-spacing:0.2em;color:var(--text);padding-bottom:16px;margin-bottom:8px;border-bottom:1px solid var(--border);}
  .set-prem{font-size:calc(8px*var(--type-scale));letter-spacing:0.14em;color:hsl(150,50%,55%);border:1px solid hsl(150,40%,30%);background:hsla(150,50%,40%,0.1);padding:2px 8px;border-radius:6px;}
  .set-row{display:flex;align-items:flex-start;justify-content:space-between;gap:20px;padding:16px 0;border-bottom:1px solid var(--border);}
  .set-row:last-of-type{border-bottom:none;}
  .set-row-title{font-size:calc(14px*var(--type-scale));color:var(--text);display:flex;align-items:center;gap:10px;}
  .set-badge{font-size:8px;text-transform:uppercase;letter-spacing:0.12em;color:var(--accent);border:1px solid var(--border);padding:2px 6px;border-radius:5px;}
  .set-row-desc{font-size:calc(12.5px*var(--type-scale));color:var(--muted);line-height:1.5;margin-top:4px;max-width:440px;text-wrap:pretty;}
  .switch{flex-shrink:0;width:42px;height:24px;border-radius:999px;background:var(--bg);border:1px solid var(--border);position:relative;transition:all .3s var(--easing);margin-top:2px;}
  .switch.on{background:var(--accent);border-color:var(--accent);}
  .switch-knob{position:absolute;top:2px;left:2px;width:18px;height:18px;border-radius:50%;background:var(--muted);transition:all .3s var(--easing);}
  .switch.on .switch-knob{transform:translateX(18px);background:var(--bg);}
  .set-account{display:flex;align-items:center;justify-content:space-between;gap:18px;padding:6px 0;}
  .set-account-text{font-size:calc(13.5px*var(--type-scale));color:var(--muted);line-height:1.55;max-width:440px;}
  .set-signin{font-size:calc(10px*var(--type-scale));text-transform:uppercase;letter-spacing:0.14em;color:var(--accent-soft);border:1px solid color-mix(in srgb,var(--accent) 45%,transparent);padding:10px 18px;border-radius:999px;min-height:40px;white-space:nowrap;transition:all .3s var(--easing);}
  .set-signin:hover{background:rgba(var(--accent-rgb),0.1);}
  .set-fine{font-size:calc(11.5px*var(--type-scale));color:#57534e;line-height:1.5;margin-top:14px;}
  .set-replay{display:block;margin:8px auto 0;font-size:calc(10px*var(--type-scale));text-transform:uppercase;letter-spacing:0.14em;color:#57534e;}
  .set-replay:hover{color:var(--muted);}

  /* ───────── Research ───────── */
  .re-meta{display:flex;gap:10px;font-size:calc(10px*var(--type-scale));text-transform:uppercase;letter-spacing:0.14em;color:var(--muted);margin-bottom:24px;}
  .re-consent{background:var(--surf);border:1px solid var(--border);border-radius:14px;padding:22px 24px;margin-bottom:24px;}
  .re-consent-head{font-size:calc(10px*var(--type-scale));text-transform:uppercase;letter-spacing:0.2em;color:var(--text);margin-bottom:12px;}
  .re-consent p{font-size:calc(13.5px*var(--type-scale));color:var(--muted);line-height:1.65;margin-bottom:18px;text-wrap:pretty;}
  .re-begin:disabled{opacity:0.4;cursor:not-allowed;}
  .re-progress{display:flex;align-items:center;gap:16px;margin-bottom:30px;}
  .re-trial-n{font-size:calc(10px*var(--type-scale));text-transform:uppercase;letter-spacing:0.14em;color:var(--muted);}
  .re-stim{text-align:center;margin-bottom:28px;}
  .re-stim-eyebrow{font-size:calc(9.5px*var(--type-scale));text-transform:uppercase;letter-spacing:0.2em;color:var(--accent);}
  .re-stim-label{font-size:calc(34px*var(--type-scale));color:var(--text);font-style:italic;margin:10px 0 12px;}
  .re-stim-q{font-size:calc(15px*var(--type-scale));color:var(--muted);max-width:420px;margin:0 auto;line-height:1.5;}
  .likert{display:flex;align-items:center;justify-content:center;gap:8px;flex-wrap:wrap;margin-bottom:30px;}
  .likert-end{font-size:calc(9.5px*var(--type-scale));text-transform:uppercase;letter-spacing:0.12em;color:#57534e;}
  .likert-btn{width:46px;height:46px;border-radius:50%;border:1px solid var(--border);color:var(--text);font-size:calc(15px*var(--type-scale));transition:all .25s var(--easing);}
  .likert-btn:hover{border-color:var(--accent);background:var(--accent);color:var(--bg);transform:scale(1.08);}
  .datalog{background:var(--bg);border:1px solid var(--border);border-radius:12px;padding:16px 18px;margin-bottom:20px;}
  .datalog-head{display:flex;align-items:center;gap:10px;font-size:calc(9.5px*var(--type-scale));text-transform:uppercase;letter-spacing:0.16em;color:var(--muted);margin-bottom:14px;}
  .datalog-live{font-size:8px;color:#57534e;}
  .datalog-live.on{color:var(--accent);}
  .datalog-feats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:14px;}
  .datalog-feat{display:flex;flex-direction:column;gap:4px;}
  .dl-k{font-size:calc(8px*var(--type-scale));text-transform:uppercase;letter-spacing:0.1em;color:#57534e;}
  .dl-v{font-size:calc(13px*var(--type-scale));color:var(--accent-soft);}
  .datalog-stream{font-size:10px;color:#57534e;line-height:1.6;overflow:hidden;border-top:1px solid var(--border);padding-top:10px;}
  .dl-line{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .re-withdraw{display:block;margin:0 auto;font-size:calc(10px*var(--type-scale));text-transform:uppercase;letter-spacing:0.14em;color:#fb7185;opacity:0.8;}
  .re-withdraw:hover{opacity:1;}
  .re-review-head{font-size:calc(11px*var(--type-scale));text-transform:uppercase;letter-spacing:0.16em;color:var(--accent-soft);margin-bottom:10px;}
  .re-review-sub{font-size:calc(13.5px*var(--type-scale));color:var(--muted);line-height:1.6;margin-bottom:20px;}
  .re-files{display:flex;flex-direction:column;gap:14px;margin-bottom:24px;}
  .re-file{background:var(--surf);border:1px solid var(--border);border-radius:12px;overflow:hidden;}
  .re-file-name{display:block;padding:10px 16px;font-size:calc(10px*var(--type-scale));color:var(--muted);border-bottom:1px solid var(--border);letter-spacing:0.04em;}
  .re-file-body{padding:14px 16px;font-size:11px;color:var(--accent-soft);line-height:1.6;overflow-x:auto;white-space:pre;}
  .re-review-actions{display:flex;align-items:center;justify-content:space-between;gap:14px;}

  /* ───────── Perform drawer (input + loop) ───────── */
  .perform{position:absolute;left:0;right:0;bottom:0;z-index:20;padding:calc(22px*var(--space)) calc(34px*var(--space)) calc(30px*var(--space));background:color-mix(in srgb,var(--surf) 86%,transparent);border-top:1px solid var(--border);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);transform:translateY(106%);opacity:0;transition:transform calc(0.6s*var(--motion)) var(--easing),opacity calc(0.6s*var(--motion)) var(--easing);box-shadow:0 -30px 80px rgba(0,0,0,0.5);max-height:74vh;overflow-y:auto;}
  .perform.is-open{transform:translateY(0);opacity:1;}
  .perform-head{display:flex;align-items:baseline;justify-content:space-between;margin:0 auto 20px;max-width:1080px;}
  .perform-grid{display:grid;grid-template-columns:0.85fr 1.15fr;gap:calc(40px*var(--space));max-width:1080px;margin:0 auto;}
  .input-note{font-size:calc(12px*var(--type-scale));color:var(--muted);line-height:1.55;text-wrap:pretty;}
  .input-note.small{font-size:calc(10.5px*var(--type-scale));color:#57534e;margin-top:12px;}
  .input-note strong{color:var(--accent-soft);font-weight:inherit;}
  .input-off{display:flex;flex-direction:column;gap:16px;align-items:flex-start;}
  .input-connect{border-color:color-mix(in srgb,var(--accent) 45%,var(--border)) !important;color:var(--accent-soft) !important;}
  .input-connecting{display:flex;align-items:center;gap:14px;color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:0.14em;}
  .input-connecting .ai-spinner{width:24px;height:24px;margin:0;}
  .input-on{display:flex;flex-direction:column;gap:16px;}
  .in-field{display:flex;flex-direction:column;gap:8px;}
  .in-label{font-size:calc(9.5px*var(--type-scale));text-transform:uppercase;letter-spacing:0.16em;color:var(--muted);}
  .in-select{background:var(--bg);border:1px solid var(--border);border-radius:9px;padding:10px 12px;color:var(--text);font-size:calc(13px*var(--type-scale));outline:none;}
  .meter{display:flex;flex-direction:column;gap:6px;}
  .meter-bars{display:flex;align-items:center;gap:2px;height:26px;position:relative;}
  .meter-seg{flex:1;height:100%;background:var(--border);border-radius:1px;transition:background .05s linear;}
  .meter-seg.on{background:var(--accent);}
  .meter-seg.on.hot{background:#fb7185;}
  .meter-clip{position:absolute;right:-4px;top:-16px;font-size:8px;text-transform:uppercase;letter-spacing:0.12em;color:#57534e;}
  .meter-clip.flash{color:#fb7185;}
  .meter-src{font-size:8.5px;text-transform:uppercase;letter-spacing:0.12em;color:#57534e;}
  .in-row{display:flex;align-items:center;gap:14px;}
  .in-row .am-range{flex:1;}
  .in-val{font-size:11px;color:var(--accent-soft);min-width:28px;text-align:right;}
  .in-toggle-row{display:flex;align-items:center;gap:12px;flex-wrap:wrap;}
  .in-latency{font-size:9px;text-transform:uppercase;letter-spacing:0.1em;color:#57534e;}
  .loop-need{font-family:'Geist',sans-serif;text-transform:none;letter-spacing:0;color:#57534e;font-size:calc(11px*var(--type-scale));margin-left:12px;}
  .slots{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;}
  .slots.disabled{opacity:0.4;pointer-events:none;}
  .slot{background:var(--bg);border:1px solid var(--border);border-radius:12px;padding:14px;display:flex;flex-direction:column;gap:10px;min-height:120px;transition:all .3s var(--easing);}
  .slot.active{border-color:color-mix(in srgb,var(--accent) 30%,var(--border));}
  .slot.frozen{border-color:color-mix(in srgb,var(--accent) 55%,transparent);box-shadow:inset 0 0 24px rgba(var(--accent-rgb),0.08);}
  .slot.muted{opacity:0.55;}
  .slot-top{display:flex;align-items:center;justify-content:space-between;}
  .slot-id{font-size:calc(22px*var(--type-scale));color:var(--accent-soft);font-style:italic;line-height:1;}

// ── useTweaks ───────────────────────────────────────────────────────────────
// Single source of truth for tweak values. setTweak persists via the host
// (__edit_mode_set_keys → host rewrites the EDITMODE block on disk).
function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  // Accepts either setTweak('key', value) or setTweak({ key: value, ... }) so a
  // useState-style call doesn't write a "[object Object]" key into the persisted
  // JSON block.
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
    // Same-window signal so in-page listeners (deck-stage rail thumbnails)
    // can react — the parent message only reaches the host, not peers.
    window.dispatchEvent(new CustomEvent('tweakchange', { detail: edits }));
  }, []);
  return [values, setTweak];
}

// ── TweaksPanel ─────────────────────────────────────────────────────────────
// Floating shell. Registers the protocol listener BEFORE announcing
// availability — if the announce ran first, the host's activate could land
// before our handler exists and the toolbar toggle would silently no-op.
// The close button posts __edit_mode_dismissed so the host's toolbar toggle
// flips off in lockstep; the host echoes __deactivate_edit_mode back which
// is what actually hides the panel.
function TweaksPanel({ title = 'Tweaks', children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" data-omelette-chrome=""
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">
          {children}
        </div>
      </div>
    </>
  );
}

// ── Layout helpers ──────────────────────────────────────────────────────────

function TweakSection({ label, children }) {

    <>

function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl">
        <span>{label}</span>
        {value != null && <span className="twk-val">{value}</span>}
      </div>
      {children}
    </div>
  );
}

// ── Controls ────────────────────────────────────────────────────────────────

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  // The active value is read by pointer-move handlers attached for the lifetime
  // of a drag — ref it so a stale closure doesn't fire onChange for every move.
  const valueRef = React.useRef(value);
  valueRef.current = value;

  // Segments wrap mid-word once per-segment width runs out. The track is
  // ~248px (280 panel − 28 body pad − 4 seg pad), each button loses 12px
  // to its own padding, and 11.5px system-ui averages ~6.3px/char — so 2
  // options fit ~16 chars each, 3 fit ~10. Past that (or >3 options), fall
  // back to a dropdown rather than wrap.
  const labelLen = (o) => String(typeof o === 'object' ? o.label : o).length;
  const maxLen = options.reduce((m, o) => Math.max(m, labelLen(o)), 0);
  const fitsAsSegments = maxLen <= ({ 2: 16, 3: 10 }[options.length] ?? 0);
  if (!fitsAsSegments) {
    // <select> emits strings — map back to the original option value so the
    // fallback stays type-preserving (numbers, booleans) like the segment path.
    const resolve = (s) => {
      const m = options.find((o) => String(typeof o === 'object' ? o.value : o) === s);
      return m === undefined ? s : typeof m === 'object' ? m.value : m;
    };
    return <TweakSelect label={label} value={value} options={options}
                        onChange={(s) => onChange(resolve(s))} />;
  }
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

// Relative-luminance contrast pick — checkmarks drawn over a swatch need to
// read on both #111 and #fafafa without per-option configuration. Hex input
// only (#rgb / #rrggbb); named or rgb()/hsl() colors fall through to "light".
function __twkIsLight(hex) {
  const h = String(hex).replace('#', '');
  const x = h.length === 3 ? h.replace(/./g, (c) => c + c) : h.padEnd(6, '0');
  const n = parseInt(x.slice(0, 6), 16);
  if (Number.isNaN(n)) return true;
  const r = (n >> 16) & 255, g = (n >> 8) & 255, b = n & 255;
  return r * 299 + g * 587 + b * 114 > 148000;
}

const __TwkCheck = ({ light }) => (
  <svg viewBox="0 0 14 14" aria-hidden="true">
    <path d="M3 7.2 5.8 10 11 4.2" fill="none" strokeWidth="2.2"
          strokeLinecap="round" strokeLinejoin="round"
          stroke={light ? 'rgba(0,0,0,.78)' : '#fff'} />
  </svg>
);

// TweakColor — curated color/palette picker. Each option is either a single
// hex string or an array of 1-5 hex strings; the card adapts — a lone color
// renders solid, a palette renders colors[0] as the hero (left ~2/3) with the
// rest stacked in a sharp column on the right. onChange emits the
// option in the shape it was passed (string stays string, array stays array).
// Without options it falls back to the native color input for back-compat.
function TweakColor({ label, value, options, onChange }) {
  if (!options || !options.length) {
    return (
      <div className="twk-row twk-row-h">
        <div className="twk-lbl"><span>{label}</span></div>
        <input type="color" className="twk-swatch" value={value}
               onChange={(e) => onChange(e.target.value)} />
      </div>
    );
  }
  // Native <input type=color> emits lowercase hex per the HTML spec, so
  // compare case-insensitively. String() guards JSON.stringify(undefined),
  // which returns the primitive undefined (no .toLowerCase).
  const key = (o) => String(JSON.stringify(o)).toLowerCase();
  const cur = key(value);
  return (
    <TweakRow label={label}>
      <div className="twk-chips" role="radiogroup">
        {options.map((o, i) => {
          const colors = Array.isArray(o) ? o : [o];
          const [hero, ...rest] = colors;
          const sup = rest.slice(0, 4);
          const on = key(o) === cur;
          return (
            <button key={i} type="button" className="twk-chip" role="radio"
                    aria-checked={on} data-on={on ? '1' : '0'}
                    aria-label={colors.join(', ')} title={colors.join(' · ')}
                    style={{ background: hero }}
                    onClick={() => onChange(o)}>
              {sup.length > 0 && (
                <span>
                  {sup.map((c, j) => <i key={j} style={{ background: c }} />)}
                </span>
              )}
              {on && <__TwkCheck light={__twkIsLight(hero)} />}
            </button>
          );
        })}
      </div>
    </TweakRow>
  );
}

function TweakButton({ label, onClick, secondary = false }) {
  return (
    <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'}
            onClick={onClick}>{label}</button>
  );
}

Object.assign(window, {
  useTweaks, TweaksPanel, TweakSection, TweakRow,
  TweakSlider, TweakToggle, TweakRadio, TweakSelect,
  TweakText, TweakNumber, TweakColor, TweakButton,
});
</script>
