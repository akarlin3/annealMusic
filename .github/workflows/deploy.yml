name: Deploy

# Runs only after the CI workflow succeeds on main, then builds and deploys
# the static site to Firebase Hosting.
on:
  workflow_run:
    workflows: ['CI']
    types: [completed]
    branches: [main]

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # `npm run build` is a multi-page Vite build that emits every entry into
      # dist/, including the Researcher console (research.html → #research-root).
      # No separate build/merge step is needed — keeping the console in the same
      # build guarantees it ships, so /research.html serves the real page instead
      # of falling through the catch-all rewrite to index.html (which renders
      # blank, as no SPA route matches /research.html).
      - name: Build
        run: npm run build

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          projectId: annealmusic
          channelId: live
