name: Deploy

# Runs only after the CI workflow succeeds on main, then builds and deploys
# the static site to Firebase Hosting.
on:
  workflow_run:
    workflows: ['CI']
    types: [completed]
    branches: [main]

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      # The Researcher console is a separate Vite build (vite.config.research.ts)
      # that emits to dist-research/. Firebase Hosting only serves dist/, so build
      # it and merge its output into dist/ — otherwise /research.html falls through
      # the catch-all rewrite to index.html and the console is unreachable.
      - name: Build research console
        run: npm run build:research

      - name: Merge research console into dist
        run: |
          mkdir -p dist/assets
          cp dist-research/research.html dist/research.html
          cp -r dist-research/assets/. dist/assets/

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          projectId: annealmusic
          channelId: live
